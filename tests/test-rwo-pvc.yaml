apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: test-rwo-spdk-volume
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: flint
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: test-rwo-pod
  namespace: default
spec:
  containers:
  - name: test-container
    image: busybox
    command: ["/bin/sh", "-c"]
    args:
      - |
        echo "=== Testing SPDK Volume ==="
        echo "Writing test data to volume..."
        dd if=/dev/zero of=/data/testfile bs=1M count=100
        echo "Test file created:"
        ls -lh /data/testfile
        echo "Disk usage:"
        df -h /data
        echo "Sleeping to keep pod running for inspection..."
        sleep 3600
    volumeMounts:
    - name: test-volume
      mountPath: /data
  volumes:
  - name: test-volume
    persistentVolumeClaim:
      claimName: test-rwo-spdk-volume
