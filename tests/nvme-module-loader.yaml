apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvme-module-loader
  namespace: flint-system
spec:
  selector:
    matchLabels:
      app: nvme-module-loader
  template:
    metadata:
      labels:
        app: nvme-module-loader
    spec:
      hostNetwork: true
      hostPID: true
      initContainers:
      - name: load-nvme-modules
        image: ubuntu:22.04
        securityContext:
          privileged: true
        command:
        - /bin/bash
        - -c
        - |
          echo "Installing kmod tools..."
          apt-get update -qq && apt-get install -y -qq kmod
          echo "Loading NVMe kernel modules..."
          modprobe nvme || echo "nvme module load failed (may already be loaded)"
          modprobe nvme-core || echo "nvme-core module load failed (may already be loaded)"
          modprobe nvme-fabrics || echo "nvme-fabrics module load failed (may already be loaded)"
          modprobe nvme-tcp || echo "nvme-tcp module load failed (may already be loaded)"
          echo "Verifying modules..."
          lsmod | grep nvme
          echo "NVMe modules loaded successfully!"
        volumeMounts:
        - name: lib-modules
          mountPath: /lib/modules
          readOnly: true
      containers:
      - name: pause
        image: gcr.io/google_containers/pause:3.2
      volumes:
      - name: lib-modules
        hostPath:
          path: /lib/modules
          type: Directory
