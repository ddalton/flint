apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvme-module-loader
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: nvme-module-loader
  template:
    metadata:
      labels:
        app: nvme-module-loader
    spec:
      hostNetwork: true
      hostPID: true
      hostIPC: true
      initContainers:
      - name: load-nvme-modules
        image: alpine:3.18
        securityContext:
          privileged: true
        command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "========================================"
          echo "Loading NVMe kernel modules on host"
          echo "========================================"
          
          # Use nsenter to run commands in host namespace
          echo "Node: $(cat /host/etc/hostname)"
          echo "Kernel: $(nsenter --mount=/host/proc/1/ns/mnt -- uname -r)"
          echo ""
          
          echo "Loading NVMe modules..."
          nsenter --mount=/host/proc/1/ns/mnt -- modprobe nvme_core || echo "nvme_core: already loaded or not available"
          nsenter --mount=/host/proc/1/ns/mnt -- modprobe nvme || echo "nvme: already loaded or not available"
          nsenter --mount=/host/proc/1/ns/mnt -- modprobe nvme_fabrics || echo "nvme_fabrics: already loaded or not available"
          nsenter --mount=/host/proc/1/ns/mnt -- modprobe nvme_tcp || echo "nvme_tcp: already loaded or not available"
          
          echo ""
          echo "Loaded NVMe modules:"
          nsenter --mount=/host/proc/1/ns/mnt -- lsmod | grep nvme || echo "No NVMe modules loaded"
          
          echo ""
          echo "NVMe module loading complete!"
          echo "========================================"
        volumeMounts:
        - name: host
          mountPath: /host
      containers:
      - name: pause
        image: gcr.io/google_containers/pause:3.2
        resources:
          limits:
            cpu: 10m
            memory: 20Mi
          requests:
            cpu: 10m
            memory: 20Mi
      volumes:
      - name: host
        hostPath:
          path: /
          type: Directory
