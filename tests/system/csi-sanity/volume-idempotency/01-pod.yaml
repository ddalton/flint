apiVersion: v1
kind: Pod
metadata:
  name: test-pod
spec:
  containers:
  - name: app
    image: busybox:latest
    command: ["sh", "-c", "echo test > /data/file && sleep 10"]
    volumeMounts:
    - name: storage
      mountPath: /data
  volumes:
  - name: storage
    persistentVolumeClaim:
      claimName: idempotency-test-pvc
  restartPolicy: Never

