apiVersion: kuttl.dev/v1beta1
kind: TestAssert
commands:
  - script: |
      # CSI Spec: CreateVolume must be idempotent
      # Calling it multiple times with same parameters should succeed
      
      echo "Testing CreateVolume idempotency..."
      echo "Volume already exists (PVC bound), deleting and recreating to test idempotency"
      
      # Delete the pod first
      kubectl delete pod test-pod --ignore-not-found --wait=false
      
      # Get the PV name
      PV_NAME=$(kubectl get pvc idempotency-test-pvc -o jsonpath='{.spec.volumeName}')
      echo "PV Name: $PV_NAME"
      
      # Delete PVC (triggers DeleteVolume)
      kubectl delete pvc idempotency-test-pvc --wait=false
      
      # Wait a moment
      sleep 2
      
      # Recreate PVC with SAME name (CSI should handle idempotently)
      cat <<EOF | kubectl apply -f -
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: idempotency-test-pvc
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
        storageClassName: flint
      EOF
      
      # Wait for new PVC to bind
      kubectl wait --for=jsonpath='{.status.phase}'=Bound pvc/idempotency-test-pvc --timeout=30s
      
      echo "✅ Volume idempotency test passed - PVC recreated successfully"

