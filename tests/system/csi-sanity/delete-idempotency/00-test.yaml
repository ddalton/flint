apiVersion: kuttl.dev/v1beta1
kind: TestAssert
commands:
  - script: |
      # CSI Spec: DeleteVolume must be idempotent
      # Deleting a non-existent volume should succeed without error
      
      echo "Testing DeleteVolume idempotency..."
      
      # Create and immediately delete a PVC
      cat <<EOF | kubectl apply -f -
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: temp-pvc
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
        storageClassName: flint
      EOF
      
      # Wait for it to bind
      kubectl wait --for=jsonpath='{.status.phase}'=Bound pvc/temp-pvc --timeout=30s
      
      PV_NAME=$(kubectl get pvc temp-pvc -o jsonpath='{.spec.volumeName}')
      echo "Created volume: $PV_NAME"
      
      # Delete it
      kubectl delete pvc temp-pvc --wait=true --timeout=30s
      echo "✅ First deletion completed"
      
      # Verify PV is gone
      if kubectl get pv $PV_NAME 2>/dev/null; then
        echo "⚠️ PV still exists (reclaim policy may be Retain)"
      else
        echo "✅ PV deleted as expected"
      fi
      
      # Try to delete the same PV again (should succeed - idempotent)
      kubectl delete pv $PV_NAME --ignore-not-found --timeout=10s
      echo "✅ Second deletion succeeded (idempotent)"
      
      echo "✅ DeleteVolume idempotency test PASSED"

