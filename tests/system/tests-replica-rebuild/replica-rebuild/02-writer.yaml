apiVersion: v1
kind: Pod
metadata:
  name: rebuild-writer
  labels:
    app: rebuild-writer
spec:
  restartPolicy: Always
  terminationGracePeriodSeconds: 5
  containers:
  - name: writer
    image: busybox:1.36
    command: ["sh", "-c"]
    args:
    - |
      echo "=== seeding fixture data ==="
      dd if=/dev/urandom of=/data/bulk bs=1M count=64 2>/dev/null
      sync
      md5sum /data/bulk > /data/checksum
      sync
      echo "seeded: $(cat /data/checksum)"
      i=1
      while true; do
        echo "$i $(date +%s)" >> /data/ledger
        sync
        i=$((i+1))
        usleep 200000
      done
    volumeMounts:
    - name: data
      mountPath: /data
  volumes:
  - name: data
    persistentVolumeClaim:
      claimName: rebuild-pvc
