apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: flint-rebuild-2r
provisioner: flint.csi.storage.io
parameters:
  numReplicas: "2"
  thinProvision: "true"
allowVolumeExpansion: false
volumeBindingMode: Immediate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rebuild-pvc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: flint-rebuild-2r
  resources:
    requests:
      storage: 2Gi
