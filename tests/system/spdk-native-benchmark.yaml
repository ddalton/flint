apiVersion: v1
kind: Pod
metadata:
  name: spdk-native-benchmark
  namespace: default
  labels:
    app: spdk-benchmark
spec:
  hostNetwork: true
  hostPID: true
  nodeSelector:
    kubernetes.io/hostname: master  # Node with NVMe device
  containers:
  - name: benchmark
    image: dilipdalton/spdk-benchmark:latest
    imagePullPolicy: Always
    securityContext:
      privileged: true
    resources:
      limits:
        cpu: "1"
        memory: "2Gi"
        hugepages-2Mi: 1Gi
      requests:
        cpu: "1"
        memory: "2Gi"
        hugepages-2Mi: 1Gi
    volumeMounts:
    - name: dev
      mountPath: /dev
    - name: sys
      mountPath: /sys
    - name: hugepages
      mountPath: /dev/hugepages
    env:
    - name: SPDK_LOG_LEVEL
      value: "DEBUG"
  volumes:
  - name: dev
    hostPath:
      path: /dev
      type: Directory
  - name: sys
    hostPath:
      path: /sys
      type: Directory
  - name: hugepages
    emptyDir:
      medium: HugePages
  restartPolicy: Never
