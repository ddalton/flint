apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cloned-pvc
status:
  phase: Bound
---
apiVersion: v1
kind: Pod
metadata:
  name: clone-verifier
status:
  phase: Succeeded
  containerStatuses:
    - name: verifier
      state:
        terminated:
          exitCode: 0
---
# Fail fast if pod goes into Error state
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
commands:
  - command: |
      PHASE=$(kubectl get pod clone-verifier --namespace=${NAMESPACE} -o jsonpath='{.status.phase}')
      if [ "$PHASE" = "Failed" ] || [ "$PHASE" = "Error" ]; then
        echo "Pod in $PHASE state - failing test"
        exit 1
      fi
    ignoreFailure: false

