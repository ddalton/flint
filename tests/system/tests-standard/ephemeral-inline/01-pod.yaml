apiVersion: v1
kind: Pod
metadata:
  name: ephemeral-test-pod
  labels:
    app: ephemeral-test
spec:
  containers:
  - name: app
    image: busybox:latest
    command: 
      - sh
      - -c
      - |
        echo "=== Testing ephemeral inline volume ==="
        echo "Volume is mounted at: /data"
        
        # Write test data
        echo "Writing test data..."
        echo "Hello from ephemeral volume!" > /data/hello.txt
        dd if=/dev/urandom of=/data/testfile bs=1M count=10
        sync
        
        # Verify write
        if [ -f /data/hello.txt ] && [ -f /data/testfile ]; then
          echo "✅ Files written successfully"
        else
          echo "❌ Failed to write files"
          exit 1
        fi
        
        # Check disk space
        echo "Disk space usage:"
        df -h /data
        
        # Calculate checksum for verification
        md5sum /data/testfile > /data/checksum.txt
        echo "Checksum saved:"
        cat /data/checksum.txt
        
        echo "=== Ephemeral volume test successful ==="
        echo "✅ Test complete"
    volumeMounts:
    - name: ephemeral-storage
      mountPath: /data
  volumes:
  - name: ephemeral-storage
    csi:
      driver: flint.csi.storage.io
      fsType: ext4
      volumeAttributes:
        size: "100Mi"
  restartPolicy: Never

