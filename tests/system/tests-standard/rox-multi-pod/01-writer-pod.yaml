apiVersion: v1
kind: Pod
metadata:
  name: writer-pod
spec:
  restartPolicy: Never
  containers:
    - name: writer
      image: busybox:latest
      command:
        - /bin/sh
        - -c
        - |
          echo "ROX_TEST_DATA" > /data/test-file.txt
          sync
          echo "Data written"
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: test-pvc
