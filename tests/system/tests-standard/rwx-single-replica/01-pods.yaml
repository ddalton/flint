---
apiVersion: v1
kind: Pod
metadata:
  name: rwx-writer-1
spec:
  containers:
  - name: writer
    image: busybox
    command:
    - sh
    - -c
    - |
      echo "Starting writer-1 at $(date)" | tee /data/writer-1.log
      for i in $(seq 1 10); do
        echo "writer-1: Message $i at $(date)" >> /data/shared.log
        echo "writer-1: Progress $i/10" >> /data/writer-1.log
        sleep 1
      done
      echo "writer-1: Completed at $(date)" | tee -a /data/writer-1.log
      # Keep running to verify data
      tail -f /dev/null
    volumeMounts:
    - name: data
      mountPath: /data
  volumes:
  - name: data
    persistentVolumeClaim:
      claimName: rwx-test-pvc
  restartPolicy: Never
