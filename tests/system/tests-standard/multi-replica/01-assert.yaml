apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 60
commands:
  - script: |
      set -e  # Exit on any error
      
      # First, wait for PVC to exist (retry loop for up to 10 seconds)
      echo "Waiting for PVC to exist..."
      for i in $(seq 1 20); do
        if kubectl get pvc test-multi-replica-pvc >/dev/null 2>&1; then
          echo "✅ PVC exists"
          break
        fi
        if [ $i -eq 20 ]; then
          echo "❌ PVC does not exist after 10 seconds"
          exit 1
        fi
        sleep 0.5
      done
      
      # Now wait for PVC to be bound
      echo "Waiting for PVC to be bound..."
      kubectl wait --for=jsonpath='{.status.phase}'=Bound pvc/test-multi-replica-pvc --timeout=45s || {
        echo "❌ PVC not bound within timeout"
        kubectl get pvc test-multi-replica-pvc
        exit 1
      }
      
      # Verify PV has replica metadata
      PV_NAME=$(kubectl get pvc test-multi-replica-pvc -o jsonpath='{.spec.volumeName}')
      if [ -z "$PV_NAME" ]; then
        echo "❌ No PV name found for PVC"
        exit 1
      fi
      echo "PV Name: $PV_NAME"
      
      # Check replica count
      REPLICA_COUNT=$(kubectl get pv $PV_NAME -o jsonpath='{.spec.csi.volumeAttributes.flint\.csi\.storage\.io/replica-count}')
      echo "Replica Count: $REPLICA_COUNT"
      if [ "$REPLICA_COUNT" != "2" ]; then
        echo "❌ Expected 2 replicas, got: $REPLICA_COUNT"
        exit 1
      fi
      
      # Check replicas JSON exists
      REPLICAS_JSON=$(kubectl get pv $PV_NAME -o jsonpath='{.spec.csi.volumeAttributes.flint\.csi\.storage\.io/replicas}')
      if [ -z "$REPLICAS_JSON" ]; then
        echo "❌ No replicas metadata found in PV"
        exit 1
      fi
      
      echo "✅ PV has correct multi-replica metadata"
      echo "Replicas: $REPLICAS_JSON"
      exit 0

