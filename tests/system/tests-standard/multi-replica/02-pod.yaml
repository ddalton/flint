apiVersion: v1
kind: Pod
metadata:
  name: test-multi-replica-pod
  labels:
    app: test-multi-replica
spec:
  containers:
  - name: app
    image: busybox:latest
    command: 
      - sh
      - -c
      - |
        echo "=== Writing test data to multi-replica volume ==="
        dd if=/dev/urandom of=/data/testfile bs=1M count=100
        sync
        md5sum /data/testfile > /data/checksum
        echo "✅ Data written successfully"
        cat /data/checksum
        echo "=== Test complete ==="
    volumeMounts:
    - name: storage
      mountPath: /data
  volumes:
  - name: storage
    persistentVolumeClaim:
      claimName: test-multi-replica-pvc
  restartPolicy: Never

