apiVersion: kuttl.dev/v1beta1
kind: TestAssert
commands:
  - script: |
      set -e  # Exit on any error
      
      # Get the current namespace
      NAMESPACE=${NAMESPACE:-default}
      echo "=== Verifying cleanup in namespace: $NAMESPACE ==="
      
      # Verify PVC is deleted
      if kubectl get pvc test-multi-replica-pvc -n $NAMESPACE 2>/dev/null; then
        echo "⚠️ PVC still exists, waiting for deletion..."
        sleep 5
      else
        echo "✅ PVC deleted successfully"
      fi
      
      # Verify Pod is deleted
      if kubectl get pod test-multi-replica-pod -n $NAMESPACE 2>/dev/null; then
        echo "⚠️ Pod still exists, waiting for deletion..."
        sleep 5
      else
        echo "✅ Pod deleted successfully"
      fi
      
      echo "✅ Multi-replica test cleanup complete"

