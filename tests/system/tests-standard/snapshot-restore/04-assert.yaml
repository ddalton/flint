apiVersion: v1
kind: Pod
metadata:
  name: snapshot-verifier
status:
  phase: Succeeded
  containerStatuses:
    - name: verifier
      state:
        terminated:
          exitCode: 0
---
# Fail fast if pod goes into Error state (don't wait for timeout)
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
commands:
  - command: kubectl get pod snapshot-verifier --namespace=${NAMESPACE} -o jsonpath='{.status.phase}' | grep -v "Error" || (echo "Pod in Error state - failing test"; exit 1)
    ignoreFailure: false
