apiVersion: v1
kind: Pod
metadata:
  name: snapshot-verifier
status:
  phase: Succeeded
  containerStatuses:
    - name: verifier
      state:
        terminated:
          exitCode: 0
---
# Fail fast if pod goes into Error state (don't wait for timeout)
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
commands:
  # Use [ ] test instead of grep to avoid kubectl flag parsing issues
  - command: |
      PHASE=$(kubectl get pod snapshot-verifier --namespace=${NAMESPACE} -o jsonpath='{.status.phase}')
      if [ "$PHASE" = "Failed" ] || [ "$PHASE" = "Error" ]; then
        echo "Pod in $PHASE state - failing test"
        exit 1
      fi
    ignoreFailure: false
