apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: snapshot-source-pvc
status:
  phase: Bound
---
apiVersion: v1
kind: Pod
metadata:
  name: initial-data-writer
status:
  phase: Succeeded
  # Note: Pod has built-in verification that fails if data can't be written
  # If this pod succeeds, we know the file exists with correct content
