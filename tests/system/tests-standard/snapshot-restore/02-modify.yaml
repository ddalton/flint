apiVersion: v1
kind: Pod
metadata:
  name: data-modifier
spec:
  restartPolicy: Never
  # Force to ublk-1 to ensure all snapshot operations use local access
  nodeSelector:
    kubernetes.io/hostname: ublk-1.vpc.cloudera.com
  containers:
    - name: modifier
      image: busybox:latest
      command:
        - /bin/sh
        - -c
        - |
          echo "MODIFIED: This data should NOT be in the snapshot" >> /data/snapshot-test.txt
          echo "Modified at: $(date)" >> /data/snapshot-test.txt
          sync
          echo "Data modified after snapshot"
          cat /data/snapshot-test.txt
      volumeMounts:
        - name: data-volume
          mountPath: /data
  volumes:
    - name: data-volume
      persistentVolumeClaim:
        claimName: snapshot-source-pvc
