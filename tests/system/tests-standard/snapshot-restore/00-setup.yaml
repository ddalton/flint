apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: snapshot-source-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: flint
---
apiVersion: v1
kind: Pod
metadata:
  name: initial-data-writer
spec:
  restartPolicy: Never
  # Force to ublk-1 to ensure local access (avoiding NVMe-oF for snapshot tests)
  nodeSelector:
    kubernetes.io/hostname: ublk-1.vpc.cloudera.com
  containers:
    - name: writer
      image: busybox:latest
      command:
        - /bin/sh
        - -c
        - |
          set -e  # Exit on any error
          echo "Writing snapshot test data..."
          echo "Snapshot Test - Initial Data" > /data/snapshot-test.txt || { echo "ERROR: Failed to write file!"; exit 1; }
          echo "Timestamp: $(date)" >> /data/snapshot-test.txt || { echo "ERROR: Failed to append to file!"; exit 1; }
          echo "This data should be in the snapshot" >> /data/snapshot-test.txt || { echo "ERROR: Failed to append to file!"; exit 1; }
          
          # CRITICAL: Ensure data is flushed to storage before snapshot
          sync || { echo "ERROR: sync failed!"; exit 1; }
          
          # Additional flush to ensure data reaches SPDK lvol
          sync /data/snapshot-test.txt || { echo "ERROR: file sync failed!"; exit 1; }
          
          # Wait a moment for flush to complete
          sleep 2
          
          # Verify data was written and is readable
          if [ ! -f /data/snapshot-test.txt ]; then
            echo "ERROR: File does not exist after write!"
            exit 1
          fi
          
          if ! grep -q "This data should be in the snapshot" /data/snapshot-test.txt; then
            echo "ERROR: File content is incorrect!"
            cat /data/snapshot-test.txt
            exit 1
          fi
          
          echo "✅ Initial data written, flushed, and verified"
          cat /data/snapshot-test.txt
          
          # Final sync before pod exits
          sync
      volumeMounts:
        - name: data-volume
          mountPath: /data
  volumes:
    - name: data-volume
      persistentVolumeClaim:
        claimName: snapshot-source-pvc
