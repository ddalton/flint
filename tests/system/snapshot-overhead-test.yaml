apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: snapshot-overhead-test
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: flint
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: snapshot-overhead-pod
  namespace: default
spec:
  containers:
  - name: writer
    image: busybox
    command: ["/bin/sh", "-c"]
    args:
      - |
        echo "📦 Volume mounted, ready for testing"
        echo "Waiting for snapshot operations..."
        sleep 3600
    volumeMounts:
    - name: data
      mountPath: /data
  volumes:
  - name: data
    persistentVolumeClaim:
      claimName: snapshot-overhead-test
