apiVersion: kuttl.dev/v1beta1
kind: TestSuite
metadata:
  name: flint-csi-driver-tests
# Global configuration for all tests (excludes clean-shutdown which must run separately)
# We use tests-standard directory to separate tests that can run in parallel
testDirs:
  - tests-standard/
timeout: 300
# Parallel execution
parallel: 4
# Suppress logs for cleaner output (set to 0 for debugging)
suppress:
  - events
# Note: clean-shutdown test runs separately via kuttl-testsuite-clean-shutdown.yaml
