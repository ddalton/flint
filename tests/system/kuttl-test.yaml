apiVersion: kuttl.dev/v1beta1
kind: TestSuite
metadata:
  name: flint-csi-driver-tests
# Global configuration for all tests
testDirs:
  - tests/
timeout: 300
# Parallel execution (set to 1 for sequential if tests interfere with each other)
parallel: 4
# Suppress logs for cleaner output (set to 0 for debugging)
suppress:
  - events
# Start kind cluster automatically (optional - remove if using existing cluster)
# kindContext: csi-test-cluster
