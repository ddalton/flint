apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: test-memory-512m
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: flint
  resources:
    requests:
      storage: 512Mi
---
apiVersion: v1
kind: Pod
metadata:
  name: test-memory-pod
  namespace: default
spec:
  containers:
  - name: test-container
    image: busybox
    command: ["/bin/sh", "-c"]
    args:
      - |
        echo "=== Testing 512MB Memory Disk Volume ==="
        echo "Node: $(cat /etc/hostname 2>/dev/null || hostname)"
        echo ""
        echo "=== Disk Info ==="
        df -h /data
        echo ""
        echo "=== Writing 256MB test file ==="
        dd if=/dev/zero of=/data/testfile bs=1M count=256 2>&1 | tail -2
        echo ""
        echo "=== File created ==="
        ls -lh /data/testfile
        echo ""
        echo "=== Final disk usage ==="
        df -h /data
        echo ""
        echo "=== Volume ready for inspection ==="
        echo "Keeping pod alive..."
        sleep 3600
    volumeMounts:
    - name: test-volume
      mountPath: /data
  volumes:
  - name: test-volume
    persistentVolumeClaim:
      claimName: test-memory-512m
