apiVersion: v1
kind: Pod
metadata:
  name: cycle-test-pod
  labels:
    test: clean-shutdown-cycle
spec:
  restartPolicy: Never
  containers:
    - name: cycler
      image: busybox:latest
      command:
        - /bin/sh
        - -c
        - |
          echo "=== Clean Shutdown Test - Rapid Cycle Test ==="
          
          # Read previous data
          if [ ! -f /data/clean-shutdown-test.txt ]; then
            echo "❌ ERROR: Previous test file not found!"
            exit 1
          fi
          
          echo "Previous iteration data:"
          cat /data/clean-shutdown-test.txt
          
          # Append new data for iteration 2
          echo "Test iteration: 2" >> /data/clean-shutdown-test.txt
          echo "Cycle timestamp: $(date)" >> /data/clean-shutdown-test.txt
          
          # Write additional data
          dd if=/dev/urandom of=/data/cycle-blob.dat bs=1M count=5 2>&1
          
          sync
          echo "=== Iteration 2 complete ==="
          
          # Count iterations
          ITERATIONS=$(grep "Test iteration:" /data/clean-shutdown-test.txt | wc -l)
          echo "Total iterations recorded: $ITERATIONS"
          
          if [ "$ITERATIONS" -ge 2 ]; then
            echo "✅ SUCCESS: Multiple mount cycles verified"
            exit 0
          else
            echo "❌ ERROR: Expected at least 2 iterations"
            exit 1
          fi
      volumeMounts:
        - name: test-volume
          mountPath: /data
  volumes:
    - name: test-volume
      persistentVolumeClaim:
        claimName: clean-shutdown-pvc

