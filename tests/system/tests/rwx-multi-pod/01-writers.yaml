apiVersion: v1
kind: Pod
metadata:
  name: writer-pod-1
  labels:
    app: multi-writer
    instance: "1"
spec:
  restartPolicy: Never
  containers:
    - name: writer
      image: busybox:latest
      command:
        - /bin/sh
        - -c
        - |
          echo "Writer 1: $(date)" >> /data/shared-file.txt
          sync
          sleep 2
          echo "Writer 1 completed"
      volumeMounts:
        - name: shared-volume
          mountPath: /data
  volumes:
    - name: shared-volume
      persistentVolumeClaim:
        claimName: shared-pvc
---
