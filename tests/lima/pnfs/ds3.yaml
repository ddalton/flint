# DS #3 for the placement (fleet-growth) drill. Started AFTER the
# first file is written so the drill can prove that growing the fleet
# does not re-map existing files' stripes. Bind on host port 20493;
# serves files out of /tmp/flint-pnfs-ds3.

apiVersion: flint.io/v1alpha1
kind: PnfsConfig
mode: ds

ds:
  bind:
    address: "0.0.0.0"
    port: 20493
    # DsControl gRPC listener (MDS → DS commands: stripe truncation).
    controlPort: 21493

  deviceId: ds-host-3

  mds:
    # MDS gRPC control endpoint. The MDS hardcodes its gRPC port to
    # bind_addr:50051 (separate from the NFSv4 port 20490). Pointing the
    # DS here so heartbeat/registration goes through gRPC, not NFS.
    endpoint: "127.0.0.1:50051"
    heartbeatInterval: 10
    registrationRetry: 5
    maxRetries: 0

  bdevs:
    - name: lvol0
      mount_point: /tmp/flint-pnfs-ds3
      spdk_volume: lvol0

  resources:
    maxConnections: 100
    ioQueueDepth: 32
    ioBufferSize: 1048576

  performance:
    useSpdkIo: false
    ioThreads: 2
    zeroCopy: false

exports:
  - path: /
    fsid: 1
    options: [rw, sync]
    access:
      - network: 0.0.0.0/0
        permissions: rw

logging:
  level: info
  format: text
  components:
    ds: info
    io: info

monitoring:
  prometheus:
    enabled: false
    port: 0
    path: /metrics
  health:
    enabled: false
    port: 0
    path: /health
  metrics: []

development:
  debug: false
  simulateFailures:
    enabled: false
    interval: 0
    duration: 0
  traceRpc: false
  dumpLayouts: false
