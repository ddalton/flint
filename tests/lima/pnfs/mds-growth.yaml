# MDS config for the placement (fleet-growth) drill.
#
# Same shape as mds.yaml plus a THIRD data server (ds-host-3) that the
# drill starts only after the first file is written. The MDS
# pre-registers every configured DS at boot, so the drill relies on
# the short heartbeatTimeout below to mark the not-yet-started DS3
# offline before the first mount — the first file must pin {ds-1,ds-2}.
#
# heartbeatInterval on the DSes is 10s (ds1/ds2/ds3.yaml); a 25s
# timeout (two missed beats + margin) offlines a silent DS reasonably
# fast without flapping the live ones. The drill sleeps past this
# window before the first mount.

apiVersion: flint.io/v1alpha1
kind: PnfsConfig
mode: mds

mds:
  bind:
    address: "0.0.0.0"
    port: 20490

  layout:
    type: file
    stripeSize: 8388608  # 8 MiB
    policy: stripe       # interleave stripes across DSes

  dataServers:
    - deviceId: ds-host-1
      endpoint: "192.168.5.2:20491"
      # MDS-reachable DsControl endpoint (clients reach the DS via
      # host.lima.internal; the MDS reaches it locally).
      controlEndpoint: "127.0.0.1:21491"
      bdevs:
        - lvol0
    - deviceId: ds-host-2
      endpoint: "192.168.5.2:20492"
      # MDS-reachable DsControl endpoint (clients reach the DS via
      # host.lima.internal; the MDS reaches it locally).
      controlEndpoint: "127.0.0.1:21492"
      bdevs:
        - lvol0
    - deviceId: ds-host-3
      endpoint: "192.168.5.2:20493"
      # MDS-reachable DsControl endpoint (clients reach the DS via
      # host.lima.internal; the MDS reaches it locally).
      controlEndpoint: "127.0.0.1:21493"
      bdevs:
        - lvol0

  state:
    backend: memory
    config: {}

  ha:
    enabled: false
    replicas: 1
    leaderElection: false
    leaseDuration: 15
    renewDeadline: 10
    retryPeriod: 2

  failover:
    heartbeatTimeout: 25
    policy: recall_affected
    gracePeriod: 60

exports:
  - path: /tmp/flint-pnfs-mds-exports
    fsid: 1
    options: [rw, sync, no_subtree_check]
    access:
      - network: 0.0.0.0/0
        permissions: rw

logging:
  level: info
  format: text
  components:
    mds: info
    layout: debug

monitoring:
  prometheus:
    enabled: false
    port: 0
    path: /metrics
  health:
    enabled: false
    port: 0
    path: /health
  metrics: []

development:
  debug: false
  simulateFailures:
    enabled: false
    interval: 0
    duration: 0
  traceRpc: false
  dumpLayouts: false
