# MDS config for the test-pnfs-recall e2e (see tests/lima/pnfs/recall.sh).
#
# Same shape as mds.yaml, with:
#   * heartbeatTimeout: 5s (was 30s) — so the heartbeat-monitor task
#     detects a killed DS within one ~10s tick after the kill, keeping
#     the test wall-time bounded.
#
# The check_interval inside `start_heartbeat_monitor` is hardcoded at
# 10s; combined with this 5s timeout the worst-case detection latency
# is ~10s after the DS goes silent. The DS heartbeat itself is 10s
# (per ds{1,2}.yaml), so a killed DS's `last_heartbeat` is between 0
# and 10s old at kill time — total wall-time before recall is up to
# ~25s. The test waits 30s.

apiVersion: flint.io/v1alpha1
kind: PnfsConfig
mode: mds

mds:
  bind:
    address: "0.0.0.0"
    port: 20490

  layout:
    type: file
    stripeSize: 8388608
    policy: stripe

  dataServers:
    - deviceId: ds-host-1
      endpoint: "192.168.5.2:20491"
      bdevs:
        - lvol0
    - deviceId: ds-host-2
      endpoint: "192.168.5.2:20492"
      bdevs:
        - lvol0

  state:
    backend: memory
    config: {}

  ha:
    enabled: false
    replicas: 1
    leaderElection: false
    leaseDuration: 15
    renewDeadline: 10
    retryPeriod: 2

  failover:
    heartbeatTimeout: 5
    policy: recall_affected
    gracePeriod: 60

exports:
  - path: /tmp/flint-pnfs-mds-exports
    fsid: 1
    options: [rw, sync, no_subtree_check]
    access:
      - network: 0.0.0.0/0
        permissions: rw

logging:
  level: info
  format: text
  components:
    mds: info
    layout: info

monitoring:
  prometheus:
    enabled: false
    port: 0
    path: /metrics
  health:
    enabled: false
    port: 0
    path: /health
  metrics: []

development:
  debug: false
  simulateFailures:
    enabled: false
    interval: 0
    duration: 0
  traceRpc: false
  dumpLayouts: false
