# DS #2 for the pNFS recall e2e (tests/lima/pnfs/recall.sh).
# Same shape as ds2.yaml with heartbeatInterval: 2 — see ds1-recall.yaml.

apiVersion: flint.io/v1alpha1
kind: PnfsConfig
mode: ds

ds:
  bind:
    address: "0.0.0.0"
    port: 20492

  deviceId: ds-host-2

  mds:
    endpoint: "127.0.0.1:50051"
    heartbeatInterval: 2
    registrationRetry: 5
    maxRetries: 0

  bdevs:
    - name: lvol0
      mount_point: /tmp/flint-pnfs-ds2
      spdk_volume: lvol0

  resources:
    maxConnections: 100
    ioQueueDepth: 32
    ioBufferSize: 1048576

  performance:
    useSpdkIo: false
    ioThreads: 2
    zeroCopy: false

exports:
  - path: /
    fsid: 1
    options: [rw, sync]
    access:
      - network: 0.0.0.0/0
        permissions: rw

logging:
  level: info
  format: text
  components:
    ds: info
    io: info

monitoring:
  prometheus:
    enabled: false
    port: 0
    path: /metrics
  health:
    enabled: false
    port: 0
    path: /health
  metrics: []

development:
  debug: false
  simulateFailures:
    enabled: false
    interval: 0
    duration: 0
  traceRpc: false
  dumpLayouts: false
