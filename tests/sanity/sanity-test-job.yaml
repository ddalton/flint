apiVersion: v1
kind: Pod
metadata:
  name: csi-sanity-test
  namespace: flint-system
spec:
  serviceAccountName: flint-csi-node
  hostNetwork: true
  containers:
  # Proxy sidecar to expose controller socket via TCP
  - name: controller-proxy
    image: alpine/socat:latest
    command:
      - sh
      - -c
      - |
        # Wait for controller pod to be ready
        while ! nc -z flint-csi-controller-grpc.flint-system.svc.cluster.local 10000 2>/dev/null; do
          echo "Waiting for controller socket proxy..."
          sleep 2
        done
        echo "✅ Controller proxy ready, forwarding to localhost:10000"
        socat TCP-LISTEN:10001,reuseaddr,fork TCP:flint-csi-controller-grpc.flint-system.svc.cluster.local:10000
  - name: sanity-tester
    image: golang:1.23
    command:
      - sh
      - -c
      - |
        set -e
        
        echo "==================================================================="
        echo "Installing csi-sanity test suite..."
        echo "==================================================================="
        
        # Clone and build csi-test from source
        cd /tmp
        git clone --depth 1 https://github.com/kubernetes-csi/csi-test.git
        cd csi-test/cmd/csi-sanity
        go build -o /usr/local/bin/csi-sanity .
        
        echo "✅ csi-sanity built and installed to /usr/local/bin/csi-sanity"
        
        echo ""
        echo "==================================================================="
        echo "Running CSI Sanity Tests Against Flint Driver"
        echo "==================================================================="
        echo "CSI Socket: /csi/csi.sock"
        echo "Node ID: $NODE_ID"
        echo "==================================================================="
        echo ""
        
        # Wait for CSI socket to be available
        while [ ! -S /csi/csi.sock ]; do
          echo "Waiting for CSI socket..."
          sleep 2
        done
        
        echo "✅ CSI socket found"
        echo ""
        
        echo "✅ csi-sanity ready"
        echo ""
        
        # Clean up any previous test artifacts (but don't create directories - let csi-sanity do it)
        rm -rf /tmp/csi-sanity-*
        
        echo "✅ Test environment cleaned"
        echo ""
        
        # Give controller proxy time to start
        echo "Waiting for controller proxy sidecar..."
        sleep 5
        echo "✅ Starting tests with controller endpoint at 127.0.0.1:10001"
        echo ""
        
        # Run sanity tests with BOTH endpoints
        # Node socket: Unix socket on local node
        # Controller socket: TCP to controller pod via proxy
        csi-sanity \
          --csi.endpoint=unix:///csi/csi.sock \
          --csi.controllerendpoint=tcp://127.0.0.1:10001 \
          --csi.stagingdir=/tmp/csi-sanity-staging \
          --csi.mountdir=/tmp/csi-sanity-mount \
          --csi.testvolumesize=1073741824 \
          --ginkgo.skip='GroupController|Modify' \
          --ginkgo.v || true
        
        echo ""
        echo "==================================================================="
        echo "CSI Sanity tests completed"
        echo "==================================================================="
        echo ""
        echo "Keeping pod running for log inspection..."
        echo "View logs with: kubectl logs -n flint-system csi-sanity-test"
        echo ""
        sleep 3600
    env:
    - name: NODE_ID
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
    volumeMounts:
    - name: socket-dir
      mountPath: /csi
    - name: pods-mount-dir
      mountPath: /var/lib/kubelet/pods
      mountPropagation: Bidirectional
    - name: device-dir
      mountPath: /dev
      mountPropagation: HostToContainer
    securityContext:
      privileged: true
  volumes:
  - name: socket-dir
    hostPath:
      path: /var/lib/kubelet/plugins/flint.csi.storage.io
      type: DirectoryOrCreate
  - name: pods-mount-dir
    hostPath:
      path: /var/lib/kubelet/pods
      type: Directory
  - name: device-dir
    hostPath:
      path: /dev
      type: Directory
  restartPolicy: Never
  # Schedule on a specific node if needed
  nodeSelector: {}
  tolerations:
  - operator: Exists

