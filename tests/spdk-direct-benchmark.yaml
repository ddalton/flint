apiVersion: v1
kind: Pod
metadata:
  name: spdk-direct-benchmark
  namespace: default
  labels:
    app: spdk-benchmark
spec:
  hostNetwork: true
  hostPID: true
  nodeSelector:
    kubernetes.io/hostname: flnt-4-46-m1  # Node with memory disk
  tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule
  - key: node-role.kubernetes.io/master
    operator: Exists
    effect: NoSchedule
  containers:
  - name: benchmark
    image: dilipdalton/spdk-malloc-benchmark:latest
    imagePullPolicy: Always
    securityContext:
      privileged: true
    resources:
      limits:
        cpu: "2"
        memory: "4Gi"
        hugepages-2Mi: "1Gi"
      requests:
        cpu: "1"
        memory: "2Gi"
        hugepages-2Mi: "1Gi"
    volumeMounts:
    - name: dev
      mountPath: /dev
    - name: sys
      mountPath: /sys
    - name: hugepages
      mountPath: /dev/hugepages
    env:
    - name: SPDK_LOG_LEVEL
      value: "INFO"
  volumes:
  - name: dev
    hostPath:
      path: /dev
      type: Directory
  - name: sys
    hostPath:
      path: /sys
      type: Directory
  - name: hugepages
    hostPath:
      path: /dev/hugepages
      type: DirectoryOrCreate
  restartPolicy: Never
