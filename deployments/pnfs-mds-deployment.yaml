apiVersion: apps/v1
kind: Deployment
metadata:
  name: pnfs-mds
  namespace: pnfs-test
  labels:
    app: pnfs-mds
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pnfs-mds
  template:
    metadata:
      labels:
        app: pnfs-mds
    spec:
      containers:
      - name: mds
        image: docker-sandbox.infra.cloudera.com/ddalton/pnfs:latest
        imagePullPolicy: Always
        command: ["/usr/local/bin/flint-pnfs-mds"]
        args:
          - "--config"
          - "/etc/flint/pnfs.yaml"
          - "--verbose"
        env:
        - name: RUST_LOG
          value: "info,spdk_csi_driver=debug"
        - name: KRB5_KTNAME
          value: "/etc/krb5/keytab"
        - name: PNFS_INSTANCE_ID
          value: "1734648000000000000"  # Shared across MDS and all DSes for filehandle compatibility
        - name: PNFS_SERVER_SCOPE
          value: "flint-pnfs-mds"  # MDS scope (different from DS to prevent trunking)
        ports:
        - containerPort: 2049
          name: nfs
          protocol: TCP
        - containerPort: 50051
          name: grpc
          protocol: TCP
        volumeMounts:
        - name: config
          mountPath: /etc/flint
        - name: data
          mountPath: /data
        - name: krb5-config
          mountPath: /etc/krb5.conf
          subPath: krb5.conf
        - name: keytab
          mountPath: /etc/krb5/keytab
          subPath: keytab
      volumes:
      - name: config
        configMap:
          name: pnfs-mds-config
      - name: data
        emptyDir: {}
      - name: krb5-config
        configMap:
          name: krb5-config
      - name: keytab
        secret:
          secretName: mds-keytab
          defaultMode: 0600
---
apiVersion: v1
kind: Service
metadata:
  name: pnfs-mds
  namespace: pnfs-test
spec:
  selector:
    app: pnfs-mds
  ports:
  - name: nfs
    port: 2049
    targetPort: 2049
    protocol: TCP
  - name: grpc
    port: 50051
    targetPort: 50051
    protocol: TCP
  type: ClusterIP

