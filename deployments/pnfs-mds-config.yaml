apiVersion: v1
kind: ConfigMap
metadata:
  name: pnfs-mds-config
  namespace: pnfs-test
data:
  pnfs.yaml: |
    apiVersion: flint.io/v1alpha1
    kind: PnfsConfig
    
    mode: mds
    
    mds:
      bind:
        address: "0.0.0.0"
        port: 2049
      
      layout:
        type: file
        stripeSize: 4194304  # 4 MB stripes for better testing
        policy: stripe       # Parallel I/O across DSs
      
      # DSs will register via gRPC, start with empty list
      dataServers: []
      
      # State backend: memory (stateless for testing)
      state:
        backend: memory
      
      # Failover configuration
      failover:
        heartbeatTimeout: 30  # 30 seconds
        policy: recall_affected  # Only recall affected layouts
    
    exports:
      - path: /
        fsid: 1
        options:
          - rw
          - sync
          - no_subtree_check
        access:
          - network: 0.0.0.0/0
            permissions: rw
    
    logging:
      level: info
      format: json

