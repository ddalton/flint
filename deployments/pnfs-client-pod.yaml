apiVersion: v1
kind: Pod
metadata:
  name: pnfs-client
  namespace: pnfs-test
  labels:
    app: pnfs-client
spec:
  containers:
  - name: client
    image: ubuntu:24.04
    command: ["/bin/bash", "-c", "sleep infinity"]
    securityContext:
      privileged: true
      capabilities:
        add:
          - SYS_ADMIN

