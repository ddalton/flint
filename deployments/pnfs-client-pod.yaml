apiVersion: v1
kind: Pod
metadata:
  name: pnfs-test-client
  namespace: pnfs-test
spec:
  containers:
  - name: client
    image: alpine:latest
    command: ["/bin/sh", "-c", "apk add --no-cache nfs-utils coreutils && sleep 3600"]
    securityContext:
      privileged: true
      capabilities:
        add: ["SYS_ADMIN"]
  restartPolicy: Never
