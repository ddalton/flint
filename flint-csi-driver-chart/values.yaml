# Default values for flint-csi-driver.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

crds:
  # Set to false if you have already installed the snapshot CRDs in your cluster
  # (they are often installed by RKE2, EKS, or other snapshot controllers)
  installSnapshotCRDs: true
  
  # SPDK-specific CRDs are always needed for this CSI driver
  # Set to false only if you've manually installed them already
  installSpdkCRDs: true

images:
  repository: docker-sandbox.infra.cloudera.com/ddalton  # Change this to your actual registry for production
  flintCsiController:
    name: flint-controller  # SPDK Controller Operator binary
    tag: latest
  flintCsiDriver:
    name: flint-driver      # CSI Driver binary (controller and node modes)
    tag: latest
  # Three-container node deployment (recommended)
  spdkTarget:
    name: spdk-tgt          # SPDK target daemon (v25.05.x)
    tag: latest
  nodeAgent:
    name: flint-node-agent  # Disk management and HTTP API server
    tag: latest

csiSidecars:
  repository: registry.k8s.io/sig-storage
  externalProvisioner:
    name: csi-provisioner
    tag: v3.1.0
  externalAttacher:
    name: csi-attacher
    tag: v3.4.0
  externalResizer:
    name: csi-resizer
    tag: v1.4.0
  externalSnapshotter:
    name: csi-snapshotter
    tag: v6.1.0
  nodeDriverRegistrar:
    name: csi-node-driver-registrar
    tag: v2.5.0
  livenessprobe:
    name: livenessprobe
    tag: v2.7.0

# Verbosity of the Flint CSI driver logging.
# 5 is the default. 9 is the most verbose.
logLevel: 5

# Allow overriding the controller's pod priority class.
priorityClassName: ""

# CSI Driver configuration
driver:
  name: "flint.csi.storage.io"
  
  # Topology configuration
  # Set to true for self-managed clusters that allow topology.kubernetes.io/hostname labels
  # Set to false for managed clusters (Rancher, EKS, GKE, AKS) that protect these labels
  useHostnameTopology: false
  
  # Custom Resources Namespace Configuration
  # By default, all Flint custom resources (SpdkDisk, SpdkVolume, SpdkSnapshot) 
  # are created in the same namespace as the CSI driver installation
  # This eliminates cross-namespace access issues and simplifies RBAC
  # 
  # Override this only if you need custom resources in a different namespace
  # Note: Make sure RBAC permissions are configured appropriately if changed
  customResourceNamespace: ""  # Empty means use .Release.Namespace
  
  # Examples:
  # Self-managed clusters (kubeadm, etc.): useHostnameTopology: true
  # Rancher-managed clusters: useHostnameTopology: false
  # EKS/GKE/AKS: useHostnameTopology: false

# Deployment configuration
deployment:
  # Node deployment architecture:
  # "three-container": Separate SPDK target, CSI driver, and node agent containers (recommended)
  #   - spdk-tgt: SPDK target daemon (privileged)
  #   - flint-csi-driver: CSI protocol handler (node mode)
  #   - node-agent: Disk management and HTTP API server
  # "two-container": Legacy mode with SPDK target and combined CSI+disk agent
  #   - spdk-tgt: SPDK target daemon (privileged)
  #   - node-agent: Both CSI protocol and disk management (not recommended)
  # "embedded": Single container with embedded SPDK and CSI (legacy compatibility)
  #   - flint-csi-driver: Single container with SPDK embedded (privileged)
  nodeMode: "three-container"

# Logging configuration
logging:
  level: "info"

# Health check configuration
healthCheck:
  # Port for health server in CSI driver container
  # Use different ports to avoid conflicts when multiple containers need health endpoints
  # Changed from 9809 to 9810 to avoid conflict with node-agent container
  csiDriverPort: 9810
  # Port for controller health server (runs in separate pod, so 9809 is fine)
  controllerPort: 9809
  # Port for node-agent health server (currently uses 8081 for API server)
  nodeAgentPort: 8082

# SPDK Controller Operator configuration
# The operator manages SPDK custom resources (SpdkVolume, SpdkDisk, etc.)
spdkOperator:
  enabled: true
  healthCheckInterval: 30
  rebuildEnabled: true

# Storage class configuration
storageClass:
  create: true
  name: "flint"
  isDefaultClass: false
  reclaimPolicy: "Delete"
  allowVolumeExpansion: true
  parameters:
    numReplicas: "2"
    autoRebuild: "true"

# Dashboard configuration
# The dashboard is fully integrated with the CSI driver and shares:
# - Service account (flint-csi-controller) with RBAC permissions
# - Node selectors, tolerations, and affinity rules
# - Log levels and priority class settings
# - Access to all SPDK CRDs and Kubernetes APIs
dashboard:
  enabled: true
  image:
    name: spdk-dashboard-backend
    tag: latest
  frontend:
    name: spdk-dashboard-frontend
    tag: latest
  resources:
    backend:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    frontend:
      requests:
        memory: "128Mi"
        cpu: "50m"
      limits:
        memory: "256Mi"
        cpu: "200m"
  # Override global scheduling settings for dashboard (optional)
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # Optional ingress configuration for external access
  ingress:
    enabled: false
    annotations: {}
      # kubernetes.io/ingress.class: nginx
      # cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - host: spdk-dashboard.local
        paths:
          - path: /
            pathType: Prefix
    tls: []
      # - secretName: spdk-dashboard-tls
      #   hosts:
      #     - spdk-dashboard.local

# Resource configuration for node containers
nodeResources:
  # SPDK Target Container - High performance storage daemon
  spdkTarget:
    requests:
      cpu: "1"
      memory: "2Gi"
      hugepages-2Mi: "1Gi"
    limits:
      cpu: "1"
      memory: "2Gi"
      hugepages-2Mi: "1Gi"
    # CPU pinning configuration for optimal performance
    # Pin SPDK to specific CPU core(s) to minimize involuntary context switches
    # Uses SPDK's native --cpumask parameter for proper reactor configuration
    # 
    # Single Core Examples:
    #   1: Pin to CPU core 1 (default, avoids core 0 which handles interrupts)
    #   2, 3, etc.: Pin to specific core if you have >2 CPU cores
    #   -1: Disable CPU pinning (not recommended for production)
    #
    # Multi-Core Examples (use hex CPU mask):
    #   "0x6": Pin to CPU cores 1 and 2 (binary: 110 = cores 1&2)
    #   "0xE": Pin to CPU cores 1, 2, and 3 (binary: 1110 = cores 1&2&3)
    #   "0x18": Pin to CPU cores 3 and 4 (binary: 11000 = cores 3&4)
    #
    # Benefits of SPDK native CPU pinning:
    #   - Eliminates involuntary context switches (should see 0 involuntary switches)
    #   - Reduces latency and improves consistent performance
    #   - Better cache locality for SPDK reactor threads
    #   - Proper DPDK EAL core assignment
    #   - Multiple cores improve throughput for high IOPS workloads
    cpuCore: 1
    
    # Scheduling policy to eliminate involuntary context switches
    # Options:
    #   "realtime": Use FIFO real-time scheduling (priority 50) - ELIMINATES context switches
    #   "high": Use high priority normal scheduling (nice -10) - REDUCES context switches  
    #   "default": Use default CFS scheduling - ALLOWS context switches
    # 
    # Warning: "realtime" requires careful system tuning to avoid blocking other processes
    # Recommended: Start with "high", upgrade to "realtime" if needed
    schedulingPolicy: "high"
    
    # Advanced: Disable RT throttling for absolute zero context switches
    # Only use with "realtime" scheduling policy
    # WARNING: Can cause system unresponsiveness if misconfigured
    # Requires: Careful monitoring and isolated CPU cores
    disableRtThrottling: false
  
  # CSI Driver Container - Lightweight CSI protocol handler
  flintCsiDriver:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  
  # Node Agent Container - Disk management and API server
  nodeAgent:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  
  # CSI Sidecar containers
  nodeDriverRegistrar:
    requests:
      cpu: "10m"
      memory: "32Mi"
    limits:
      cpu: "100m"
      memory: "64Mi"
  
  livenessprobe:
    requests:
      cpu: "10m"
      memory: "32Mi"
    limits:
      cpu: "100m"
      memory: "64Mi"

# Global scheduling settings (applied to all components including dashboard)
nodeSelector: {}
tolerations: []
affinity: {}
