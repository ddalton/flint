# Default values for flint-csi-driver.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

crds:
  # Set to false if you have already installed the snapshot CRDs in your cluster
  # (they are often installed by RKE2, EKS, or other snapshot controllers)
  installSnapshotCRDs: true
  
  # SPDK-specific CRDs are NO LONGER NEEDED in minimal state architecture
  # The CSI driver now queries SPDK directly for real-time data
  installSpdkCRDs: false

images:
  repository: dilipdalton  # Docker Hub registry
  flintCsiDriver:
    name: flint-driver      # CSI Driver binary (supports controller and node modes via CSI_MODE env var)
    tag: "1.12.0"           # Spark-enablement release: dir-per-volume CSI isolation, v2 metadata filehandles, MDS perf Tier 1
  # SPDK Target daemon (runs on each node)
  spdkTarget:
    name: spdk-tgt          # SPDK target daemon (SPDK v26.05)
    tag: "1.5.0"            # SPDK v26.05 + raid skip_rebuild/leased-quiesce patch v3 (unchanged; promoted from 1.4.0)
  # NFS Server for ReadWriteMany (RWX) volumes
  # By default, uses the same image as flintCsiDriver (which includes flint-nfs-server binary)
  # Uncomment to override with a separate NFS server image
  # flintNfsServer:
  #   name: flint-nfs-server
  #   tag: latest
  #   pullPolicy: IfNotPresent
  # Legacy images (no longer used in minimal state architecture)
  # flintCsiController: replaced by flintCsiDriver with CSI_MODE=controller
  # nodeAgent: replaced by flintCsiDriver with CSI_MODE=node

csiSidecars:
  repository: registry.k8s.io/sig-storage
  externalProvisioner:
    name: csi-provisioner
    tag: v3.6.0  # Upgraded from v3.1.0 for better ephemeral volume support
  externalAttacher:
    name: csi-attacher
    tag: v4.4.0  # Upgraded from v3.4.0 for latest features
  externalResizer:
    name: csi-resizer
    tag: v1.9.0  # Upgraded from v1.4.0 for latest features
  externalSnapshotter:
    name: csi-snapshotter
    tag: v6.3.0  # Upgraded from v6.1.0 for latest features
  nodeDriverRegistrar:
    name: csi-node-driver-registrar
    tag: v2.9.0  # Upgraded from v2.5.0 for ephemeral volume fixes
  livenessprobe:
    name: livenessprobe
    tag: v2.11.0  # Upgraded from v2.7.0 for latest features

# Verbosity of the Flint CSI driver logging.
# 5 is the default. 9 is the most verbose.
logLevel: 5

# Allow overriding the controller's pod priority class.
priorityClassName: ""

# CSI Driver configuration
driver:
  name: "flint.csi.storage.io"
  
  # Ephemeral volume support (CSI inline volumes)
  # When enabled, Pods can declare Flint volumes directly in their spec without creating PVCs
  # Ephemeral volumes are automatically created on Pod start and deleted on Pod termination
  # Requires Kubernetes v1.25+ (or v1.21-v1.24 with CSIInlineVolume feature gate)
  enableEphemeral: true
  
  # CSI Sanity testing support
  # Exposes controller gRPC socket via TCP for csi-sanity test suite
  # Only enable in test/dev environments
  enableSanityTestProxy: false
  sanityProxyPort: 10000
  
  # Topology configuration
  # Set to true for self-managed clusters that allow topology.kubernetes.io/hostname labels
  # Set to false for managed clusters (Rancher, EKS, GKE, AKS) that protect these labels
  useHostnameTopology: false
  
  # Custom Resources Namespace Configuration
  # By default, all Flint custom resources (SpdkDisk, SpdkVolume, SpdkSnapshot) 
  # are created in the same namespace as the CSI driver installation
  # This eliminates cross-namespace access issues and simplifies RBAC
  # 
  # Override this only if you need custom resources in a different namespace
  # Note: Make sure RBAC permissions are configured appropriately if changed
  customResourceNamespace: ""  # Empty means use .Release.Namespace
  
  # Examples:
  # Self-managed clusters (kubeadm, etc.): useHostnameTopology: true
  # Rancher-managed clusters: useHostnameTopology: false
  # EKS/GKE/AKS: useHostnameTopology: false

# Deployment configuration
deployment:
  # Node deployment architecture:
  # "three-container": Separate SPDK target, CSI driver, and node agent containers (recommended)
  #   - spdk-tgt: SPDK target daemon (privileged)
  #   - flint-csi-driver: CSI protocol handler (node mode)
  #   - node-agent: Disk management and HTTP API server
  # "two-container": Legacy mode with SPDK target and combined CSI+disk agent
  #   - spdk-tgt: SPDK target daemon (privileged)
  #   - node-agent: Both CSI protocol and disk management (not recommended)
  # "embedded": Single container with embedded SPDK and CSI (legacy compatibility)
  #   - flint-csi-driver: Single container with SPDK embedded (privileged)
  # "nfs-only": No SPDK sidecar — all volumes served via NFS with emptyDir (Kind/dev clusters)
  #   - flint-csi-driver: CSI protocol handler only (~100MB vs ~3GB per node)
  nodeMode: "three-container"

# Logging configuration
logging:
  level: "info"

# Health check configuration
healthCheck:
  # Port for health server in CSI driver container
  # In three-container mode, the node-agent is integrated into flint-csi-driver, so 9809 is safe
  csiDriverPort: 9809
  # Port for controller health server (runs in separate pod)
  controllerPort: 9809
  # Port for node-agent API server (integrated into flint-csi-driver in three-container mode)
  # Changed from 8081 to 9081 to avoid conflicts with nginx ingress controllers
  nodeAgentPort: 9081

# SPDK Controller Operator configuration — DEFAULT OFF (audit L4
# verification, 2026-07-04): the legacy replacement-rebuild flow this pod
# was named for is unreachable (module never invoked by the shipped
# binary, dedicated bin target not built), and the pod as deployed only
# ran the standard driver against a misconfigured SPDK socket URL,
# logging connection errors every tick while REBUILD_ENABLED was read by
# dead code. Replica healing is owned by the Tier-1/2 orchestrators in
# the controller (FLINT_CATCHUP / FLINT_HOT_REJOIN). Re-enable only if
# you know exactly why.
spdkOperator:
  enabled: false
  healthCheckInterval: 30
  rebuildEnabled: true

# Storage class configuration
storageClass:
  create: true
  name: "flint"
  isDefaultClass: false
  reclaimPolicy: "Delete"
  allowVolumeExpansion: true
  parameters:
    numReplicas: "1"  # Single replica (default). Set to "2" or "3" for multi-replica HA (not yet implemented)
    autoRebuild: "true"
    thinProvision: "true"  # Thin provisioning (space allocated on write). Set to "false" for thick (full allocation up front; note: the first snapshot converts the head to thin and pins the full image — see docs/incremental-replica-rebuild.md §5)
    nfsEmptyDir: "false"  # Set to "true" for Kind/dev clusters (bypasses kernel block device requirement)

# VolumeSnapshotClass configuration
snapshotClass:
  enabled: true
  name: csi-snapclass
  deletionPolicy: Delete  # Delete or Retain
  parameters: {}
    # Optional parameters for snapshot operations
    # Currently no parameters needed - snapshots use SPDK defaults

# Dashboard configuration
# The dashboard is fully integrated with the CSI driver and shares:
# - Service account (flint-csi-controller) with RBAC permissions
# - Node selectors, tolerations, and affinity rules
# - Log levels and priority class settings
# - Access to all SPDK CRDs and Kubernetes APIs
dashboard:
  enabled: true
  # Authentication for the dashboard API (enforced by the backend).
  auth:
    # Password for the "admin" user (full access, including destructive disk
    # operations). Empty = generated at install and preserved across upgrades;
    # read it from the spdk-dashboard-auth Secret.
    adminPassword: ""
    # Password for the optional read-only "viewer" user. Empty = viewer login
    # disabled.
    viewerPassword: ""
    # Session token lifetime in seconds (default 12h).
    sessionTtlSecs: 43200
  backend:
    port: 8080
  frontend:
    name: spdk-dashboard-frontend
    tag: "1.9.0"      # timeline brush zoom (focus+context), PVC-name search, System disk bucket, compact overview
    port: 3000
  resources:
    backend:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    frontend:
      requests:
        memory: "128Mi"
        cpu: "50m"
      limits:
        memory: "256Mi"
        cpu: "200m"
  # Override global scheduling settings for dashboard (optional)
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # Optional ingress configuration for external access
  ingress:
    enabled: false
    annotations: {}
      # kubernetes.io/ingress.class: nginx
      # cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - host: spdk-dashboard.local
        paths:
          - path: /
            pathType: Prefix
    tls: []
      # - secretName: spdk-dashboard-tls
      #   hosts:
      #     - spdk-dashboard.local

# Global scheduling settings (applied to all components including dashboard)
nodeSelector: {}
# Best practice: CSI node drivers should run on ALL nodes, including control-plane
# This matches the behavior of standard CSI drivers (Cinder, EBS, etc.)
tolerations:
  - operator: Exists  # Tolerate all taints, including control-plane/master taints
affinity: {}

# ReadWriteMany (RWX) support via NFS server
# EXPERIMENTAL: This feature is in beta and disabled by default
# When enabled, RWX PVCs will automatically deploy an NFS server pod
# that exports the underlying SPDK volume over NFS
nfs:
  # Enable NFS server support for ReadWriteMany and ReadOnlyMany volumes
  # Set to false to maintain existing RWO-only behavior (zero regression)
  enabled: true
  
  # NFS server port (standard NFS port, do not change unless required)
  port: 2049
  
  # Resource limits for NFS server pods
  # These pods run on nodes with volume replicas for local access
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"
  
  # Namespace for NFS server pods (defaults to CSI driver namespace)
  namespace: ""  # Empty means use .Release.Namespace
  
  # Labels to apply to NFS server pods (for monitoring/selection)
  podLabels:
    app: flint-nfs-server
  
  # Annotations for NFS server pods
  podAnnotations: {}
  
  # Image pull secrets for NFS server (if registry requires authentication)
  imagePullSecrets: []

# pNFS support (Parallel NFS, RFC 8881) — opt-in.
#
# When enabled, StorageClasses with `parameters.layout: pnfs` are
# provisioned by talking to a Flint pNFS MDS over gRPC; the resulting
# volume is striped across one or more Data Servers (DSes) and
# mounted on the kernel client via NFSv4.1.
#
# Disabled by default. The flint-csi-controller reads
# FLINT_PNFS_MDS_ENDPOINT from the env var injected here; if unset
# (i.e. pnfs.enabled is false), every pNFS code path in the driver
# is dormant and SPDK-only deployments are byte-identical to the
# pre-pNFS build.
#
# The chart can deploy the MDS + DS fleet itself (pnfs.server.enabled,
# the durable-DS plan Phase 1 shape: MDS Deployment on a flint PVC +
# DS StatefulSet with per-pod PVCs and per-pod ClusterIP Services), or
# point at an externally managed MDS via pnfs.mdsEndpoint.
pnfs:
  # When false, the FLINT_PNFS_MDS_ENDPOINT env var is omitted and
  # the driver refuses any layout: pnfs StorageClass with a clear
  # FAILED_PRECONDITION error. This is the safe default.
  enabled: false

  # gRPC endpoint of an EXTERNALLY managed MDS. Ignored (and may be
  # left empty) when pnfs.server.enabled is true — the controller then
  # defaults to the in-chart flint-pnfs-mds Service.
  # Forms accepted by the driver:
  #   "flint-pnfs-mds:50051"            — bare host:port (http:// added)
  #   "http://flint-pnfs-mds:50051"     — explicit scheme
  #   "https://mds.example.com:50051"   — TLS (channel honours it,
  #                                        though cluster TLS isn't
  #                                        provisioned by this chart)
  mdsEndpoint: ""

  # ── Control-plane auth ────────────────────────────────────────────
  # Bearer token required on every MDS gRPC (50051) call: DS
  # registration/heartbeats and CSI CreateVolume/DeleteVolume. Without
  # it, ANY pod that can reach 50051 can register itself as a data
  # server and attract stripe writes. Enabled ⇒ the chart creates a
  # Secret with a random token (or uses controlToken.existingSecret)
  # and injects FLINT_PNFS_CONTROL_TOKEN into the MDS, DS fleet, and
  # CSI controller. Default ON whenever the in-chart server is
  # deployed — turning it off prints a loud MDS boot warning.
  controlToken:
    enabled: true
    # Name of an existing Secret with key `token` to use instead of a
    # chart-generated one (e.g. for GitOps-managed secrets).
    existingSecret: ""

  # ── Network isolation (Tier A) ────────────────────────────────────
  # NetworkPolicies for the pNFS ports. NFS mounts originate from the
  # NODE kernel (kubelet NodeStage), so 2049 must admit node-CIDR
  # traffic — set nodeCIDRs to your node network(s). hostNetwork pods
  # share the node identity and are admitted too; combine with the
  # control token (above) for the control plane. Default OFF because a
  # wrong/missing nodeCIDR breaks every pNFS mount; enable it as part
  # of the production checklist (see docs/pnfs-operator-runbook.md,
  # "Trust model").
  networkPolicy:
    enabled: false
    # CIDRs the NFS data ports (2049 on MDS + DSes) accept, e.g.
    # ["172.31.0.0/16"]. REQUIRED when enabled — an empty list renders
    # a policy that blocks all NFS traffic.
    nodeCIDRs: []

  # In-chart pNFS server fleet (durable-DS plan Phase 1).
  server:
    enabled: false

    # MDS + DS ship in one image (both binaries; entrypoint selects).
    image:
      name: flint-pnfs
      tag: "1.12.0"  # DS fd-cache eviction on stripe cleanup (capacity leak), dir-per-volume, MDS perf Tier 1

    # FILE-layout stripe unit in bytes. Pinned PER FILE at first
    # LAYOUTGET (Phase 0): changing this affects only files created
    # after the change. 8 MiB default; 1-4 MiB suits small-file-heavy
    # datasets.
    stripeSize: 8388608

    # RUST_LOG / config log level for MDS + DS pods.
    logLevel: info

    mds:
      # MDS shard count (mds-sharding-plan.md). Each shard is an
      # independent single-replica MDS owning a disjoint set of
      # volumes, pinned at CreateVolume. 1 = the classic single MDS
      # (renders identically to pre-sharding charts; shard 0 keeps all
      # legacy object names, so upgrades adopt in place). Scale DOWN
      # only if the removed shards own zero volumes. count > 1 needs
      # images >= 1.13.0 (CSI shard routing + DS fan-out registration).
      count: 1
      # Seconds without a DS heartbeat before the MDS marks it offline
      # and recalls its layouts. DS heartbeatInterval is 10s; keep this
      # >= 2 missed beats + margin.
      heartbeatTimeout: 30
      # PVC backing /data (export tree + sqlite state.db). Defaults to
      # the chart's own StorageClass — a replicated flint volume makes
      # MDS state survive node loss.
      storage:
        storageClassName: ""   # "" → storageClass.name
        size: 10Gi
      resources: {}

    dataServers:
      # DS fleet width. Scaling UP is safe (new files stripe wider;
      # existing files keep their pinned placement). Scaling DOWN is
      # NOT supported until the drain milestone — don't.
      count: 2
      heartbeatInterval: 10
      # PVC per DS (StatefulSet volumeClaimTemplate). On the flint
      # StorageClass with numReplicas >= 2 this is the durable-DS
      # story: replica failures rebuild underneath the DS, and a
      # rescheduled DS pod reattaches its data instead of losing it.
      storage:
        storageClassName: ""   # "" → storageClass.name
        size: 100Gi
      # Prefer spreading DS pods across nodes (soft anti-affinity) so
      # one node loss degrades at most one DS.
      spreadAcrossNodes: true
      resources: {}

# Block device configuration
blockDevice:
  # Backend type: "ublk" (default, high performance) or "nvmeof" (kernel NVMe-oF)
  backend: "nvmeof"

  # Device discovery mode
  # Controls which block devices are discovered and made available for storage
  # Options:
  #   "nvme"  - Only discover NVMe devices (default, existing behavior)
  #   "all"   - Discover all block devices (NVMe + SCSI/SATA)
  #   "scsi"  - Only discover SCSI/SATA devices (for testing)
  discoveryMode: "nvme"

  # ublk performance tuning (only applies when backend=ublk)
  # These settings control parallelism and throughput for high-speed NVMe disks
  ublk:
    # Number of I/O queues for parallel processing
    # Recommended: Match number of CPU cores (e.g., 8 for 8-core systems)
    # Higher values enable better parallelism across multiple cores
    numQueues: 8

    # Queue depth for outstanding I/O operations
    # Higher values allow more I/O operations to be in flight simultaneously
    # Recommended: 512-1024 for high-performance NVMe (7GB/s+)
    queueDepth: 512

# SPDK Target runtime configuration
spdkTarget:
  # Extra arguments passed to spdk_tgt (requires "$@" in entrypoint)
  # For Kind/dev clusters, use kindMode.enabled=true instead of manual extraArgs
  extraArgs: []

  # Hugepages configuration
  hugepages:
    # Set to false to disable hugepages (for --no-huge mode)
    enabled: true
    # Hugepage size: "2Mi" or "1Gi"
    size: "2Mi"
    # Total hugepage memory to request
    amount: "8Gi"

  # Memory request/limit (separate from hugepages)
  memory:
    request: "1Gi"
    limit: "2Gi"

  # Kind/dev cluster mode: uses --wait-for-rpc to minimize memory pools
  # and optionally creates a virtual disk for CSI capacity.
  # Reduces SPDK memory from ~1.4GB to ~26MB by minimizing ioBuf and iSCSI pools.
  kindMode:
    enabled: false
    # Override SPDK image for Kind (uses spdk-tgt-kind with wait-for-rpc entrypoint)
    image:
      name: spdk-tgt-kind
      tag: latest
    # SPDK DPDK EAL memory allocation in MB (passed as -s flag)
    # Must be large enough for: iobuf pools (~170MB) + virtual disk + subsystem overhead
    spdkMemoryMB: 2048
    # Virtual disk: malloc bdev + LVS for CSI capacity (allocated from SPDK memory)
    # Size must fit within spdkMemoryMB minus ~300MB overhead for pools/subsystems
    virtualDisk:
      sizeMB: 0          # e.g. 1536 for 1.5GB. 0 = disabled
      path: "/var/tmp/spdk-virtual.img"
      lvsName: "lvs_kind"
    # Container memory limits (must exceed spdkMemoryMB + ~512MB process overhead)
    memory:
      request: "2048Mi"
      limit: "2560Mi"

# Node resources configuration (e.g., CPU core masks for SPDK target)
nodeResources:
  spdkTarget:
    # CPU core mask for SPDK target (hex format, e.g., "0x2" for core 1)
    cpuCore: ""

# Reserved devices configuration
# Devices listed here will be excluded from Flint CSI discovery and management
# These devices can be used for direct SPDK access via device plugins
reservedDevices:
  # List of PCI addresses to reserve (one per line)
  # Example:
  # list: |
  #   0000:02:00.0
  #   0000:03:00.0
  list: ""

  # Optional annotations for reserved devices (for UI display)
  # Format: PCI_ADDRESS: description
  # Example:
  # annotations: |
  #   0000:02:00.0: High-performance device for database workloads
  #   0000:03:00.0: Reserved for ML training
  annotations: ""
