# Default values for flint-csi-driver.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

crds:
  # Set to false if you have already installed the snapshot CRDs in your cluster
  install: true

images:
  repository: flint  # Change this to your actual registry for production
  flintCsiController:
    name: flint-controller
    tag: latest
  flintCsiDriver:
    name: flint-driver
    tag: latest
  nodeAgent:
    name: flint-node-agent
    tag: latest
  spdkTgt:
    name: spdk-tgt
    tag: latest

csiSidecars:
  repository: registry.k8s.io/sig-storage
  externalProvisioner:
    name: csi-provisioner
    tag: v3.1.0
  externalAttacher:
    name: csi-attacher
    tag: v3.4.0
  externalResizer:
    name: csi-resizer
    tag: v1.4.0
  externalSnapshotter:
    name: csi-snapshotter
    tag: v6.1.0
  nodeDriverRegistrar:
    name: csi-node-driver-registrar
    tag: v2.5.0
  livenessprobe:
    name: livenessprobe
    tag: v2.7.0

# Verbosity of the Flint CSI driver logging.
# 5 is the default. 9 is the most verbose.
logLevel: 5

# Allow overriding the controller's pod priority class.
priorityClassName: ""

# CSI Driver configuration
driver:
  name: "flint.csi.storage.io"

# Storage class configuration
storageClass:
  create: true
  name: "flint"
  isDefaultClass: false
  reclaimPolicy: "Delete"
  allowVolumeExpansion: true
  parameters:
    numReplicas: "2"
    autoRebuild: "true"
