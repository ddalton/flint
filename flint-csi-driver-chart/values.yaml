# Default values for flint-csi-driver.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

crds:
  # Set to false if you have already installed the snapshot CRDs in your cluster
  install: true

images:
  repository: docker-sandbox.infra.cloudera.com/ddalton
  flintCsiController:
    name: flint-controller
    tag: 0.0.1
  flintCsiDriver:
    name: flint-driver
    tag: 0.0.1
  nodeAgent:
    name: flint-node-agent
    tag: 0.0.1
  spdkTgt:
    name: spdk-tgt
    tag: 0.0.1

csiSidecars:
  repository: registry.k8s.io/sig-storage
  externalProvisioner:
    name: csi-provisioner
    tag: v3.1.0
  externalAttacher:
    name: csi-attacher
    tag: v3.4.0
  externalResizer:
    name: csi-resizer
    tag: v1.4.0
  externalSnapshotter:
    name: csi-snapshotter
    tag: v6.1.0
  nodeDriverRegistrar:
    name: csi-node-driver-registrar
    tag: v2.5.0
  livenessprobe:
    name: livenessprobe
    tag: v2.7.0

# Verbosity of the Flint CSI driver logging.
# 5 is the default. 9 is the most verbose.
logLevel: 5

# Allow overriding the controller's pod priority class.
priorityClassName: ""
