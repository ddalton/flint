# Default values for flint-csi-driver.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

crds:
  # Set to false if you have already installed the snapshot CRDs in your cluster
  # (they are often installed by RKE2, EKS, or other snapshot controllers)
  installSnapshotCRDs: true
  
  # SPDK-specific CRDs are NO LONGER NEEDED in minimal state architecture
  # The CSI driver now queries SPDK directly for real-time data
  installSpdkCRDs: false

images:
  repository: docker-sandbox.infra.cloudera.com/ddalton  # Change this to your actual registry for production
  flintCsiDriver:
    name: flint-driver      # CSI Driver binary (supports controller and node modes via CSI_MODE env var)
    tag: latest
  # SPDK Target daemon (runs on each node)
  spdkTarget:
    name: spdk-tgt          # SPDK target daemon (v25.05.x)
    tag: latest
  # NFS Server for ReadWriteMany (RWX) volumes
  # By default, uses the same image as flintCsiDriver (which includes flint-nfs-server binary)
  # Uncomment to override with a separate NFS server image
  # flintNfsServer:
  #   name: flint-nfs-server
  #   tag: latest
  #   pullPolicy: IfNotPresent
  # Legacy images (no longer used in minimal state architecture)
  # flintCsiController: replaced by flintCsiDriver with CSI_MODE=controller
  # nodeAgent: replaced by flintCsiDriver with CSI_MODE=node

csiSidecars:
  repository: registry.k8s.io/sig-storage
  externalProvisioner:
    name: csi-provisioner
    tag: v3.6.0  # Upgraded from v3.1.0 for better ephemeral volume support
  externalAttacher:
    name: csi-attacher
    tag: v4.4.0  # Upgraded from v3.4.0 for latest features
  externalResizer:
    name: csi-resizer
    tag: v1.9.0  # Upgraded from v1.4.0 for latest features
  externalSnapshotter:
    name: csi-snapshotter
    tag: v6.3.0  # Upgraded from v6.1.0 for latest features
  nodeDriverRegistrar:
    name: csi-node-driver-registrar
    tag: v2.9.0  # Upgraded from v2.5.0 for ephemeral volume fixes
  livenessprobe:
    name: livenessprobe
    tag: v2.11.0  # Upgraded from v2.7.0 for latest features

# Verbosity of the Flint CSI driver logging.
# 5 is the default. 9 is the most verbose.
logLevel: 5

# Allow overriding the controller's pod priority class.
priorityClassName: ""

# CSI Driver configuration
driver:
  name: "flint.csi.storage.io"
  
  # Ephemeral volume support (CSI inline volumes)
  # When enabled, Pods can declare Flint volumes directly in their spec without creating PVCs
  # Ephemeral volumes are automatically created on Pod start and deleted on Pod termination
  # Requires Kubernetes v1.25+ (or v1.21-v1.24 with CSIInlineVolume feature gate)
  enableEphemeral: true
  
  # CSI Sanity testing support
  # Exposes controller gRPC socket via TCP for csi-sanity test suite
  # Only enable in test/dev environments
  enableSanityTestProxy: false
  sanityProxyPort: 10000
  
  # Topology configuration
  # Set to true for self-managed clusters that allow topology.kubernetes.io/hostname labels
  # Set to false for managed clusters (Rancher, EKS, GKE, AKS) that protect these labels
  useHostnameTopology: false
  
  # Custom Resources Namespace Configuration
  # By default, all Flint custom resources (SpdkDisk, SpdkVolume, SpdkSnapshot) 
  # are created in the same namespace as the CSI driver installation
  # This eliminates cross-namespace access issues and simplifies RBAC
  # 
  # Override this only if you need custom resources in a different namespace
  # Note: Make sure RBAC permissions are configured appropriately if changed
  customResourceNamespace: ""  # Empty means use .Release.Namespace
  
  # Examples:
  # Self-managed clusters (kubeadm, etc.): useHostnameTopology: true
  # Rancher-managed clusters: useHostnameTopology: false
  # EKS/GKE/AKS: useHostnameTopology: false

# SPDK configuration
spdk:
  # Force shutdown timeout (seconds) - OPT-IN for safety
  # When > 0: During shutdown, if threads have pending messages for longer than this timeout,
  #           force drain the messages and exit cleanly (prevents indefinite hangs)
  # When = 0: Default safe behavior - wait indefinitely for messages to be processed
  # 
  # Use cases:
  # - Production: 0 (safe default, never force shutdown)
  # - Dev/Test: 10-30 (prevent hangs during rapid restarts/testing)
  # - Recovery scenarios: 10 (allows clean shutdown even with corrupted blobstore)
  #
  # Note: Only affects abnormal shutdowns (e.g., stuck blobstore recovery)
  #       Normal shutdowns complete quickly regardless of this setting
  forceShutdownTimeout: 0  # seconds (0 = disabled, safe default)

# Deployment configuration
deployment:
  # Node deployment architecture:
  # "three-container": Separate SPDK target, CSI driver, and node agent containers (recommended)
  #   - spdk-tgt: SPDK target daemon (privileged)
  #   - flint-csi-driver: CSI protocol handler (node mode)
  #   - node-agent: Disk management and HTTP API server
  # "two-container": Legacy mode with SPDK target and combined CSI+disk agent
  #   - spdk-tgt: SPDK target daemon (privileged)
  #   - node-agent: Both CSI protocol and disk management (not recommended)
  # "embedded": Single container with embedded SPDK and CSI (legacy compatibility)
  #   - flint-csi-driver: Single container with SPDK embedded (privileged)
  nodeMode: "three-container"

# Logging configuration
logging:
  level: "info"

# Health check configuration
healthCheck:
  # Port for health server in CSI driver container
  # In three-container mode, the node-agent is integrated into flint-csi-driver, so 9809 is safe
  csiDriverPort: 9809
  # Port for controller health server (runs in separate pod)
  controllerPort: 9809
  # Port for node-agent health server (currently uses 8081 for API server)
  nodeAgentPort: 8082

# SPDK Controller Operator configuration
# The operator manages SPDK custom resources (SpdkVolume, SpdkDisk, etc.)
spdkOperator:
  enabled: true
  healthCheckInterval: 30
  rebuildEnabled: true

# Storage class configuration
storageClass:
  create: true
  name: "flint"
  isDefaultClass: false
  reclaimPolicy: "Delete"
  allowVolumeExpansion: true
  parameters:
    numReplicas: "1"  # Single replica (default). Set to "2" or "3" for multi-replica HA (not yet implemented)
    autoRebuild: "true"
    thinProvision: "false"  # Set to "true" for thin provisioning (space allocated on write)

# VolumeSnapshotClass configuration
snapshotClass:
  enabled: true
  name: csi-snapclass
  deletionPolicy: Delete  # Delete or Retain
  parameters: {}
    # Optional parameters for snapshot operations
    # Currently no parameters needed - snapshots use SPDK defaults

# Dashboard configuration
# The dashboard is fully integrated with the CSI driver and shares:
# - Service account (flint-csi-controller) with RBAC permissions
# - Node selectors, tolerations, and affinity rules
# - Log levels and priority class settings
# - Access to all SPDK CRDs and Kubernetes APIs
dashboard:
  enabled: true
  backend:
    port: 8080
  frontend:
    name: spdk-dashboard-frontend
    tag: latest
    port: 3000
  resources:
    backend:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    frontend:
      requests:
        memory: "128Mi"
        cpu: "50m"
      limits:
        memory: "256Mi"
        cpu: "200m"
  # Override global scheduling settings for dashboard (optional)
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # Optional ingress configuration for external access
  ingress:
    enabled: false
    annotations: {}
      # kubernetes.io/ingress.class: nginx
      # cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - host: spdk-dashboard.local
        paths:
          - path: /
            pathType: Prefix
    tls: []
      # - secretName: spdk-dashboard-tls
      #   hosts:
      #     - spdk-dashboard.local

# Global scheduling settings (applied to all components including dashboard)
nodeSelector: {}
tolerations: []
affinity: {}

# ReadWriteMany (RWX) support via NFS server
# EXPERIMENTAL: This feature is in beta and disabled by default
# When enabled, RWX PVCs will automatically deploy an NFS server pod
# that exports the underlying SPDK volume over NFS
nfs:
  # Enable NFS server support for ReadWriteMany volumes
  # Set to false to maintain existing RWO-only behavior (zero regression)
  enabled: false
  
  # NFS server port (standard NFS port, do not change unless required)
  port: 2049
  
  # Resource limits for NFS server pods
  # These pods run on nodes with volume replicas for local access
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"
  
  # Namespace for NFS server pods (defaults to CSI driver namespace)
  namespace: ""  # Empty means use .Release.Namespace
  
  # Labels to apply to NFS server pods (for monitoring/selection)
  podLabels:
    app: flint-nfs-server
  
  # Annotations for NFS server pods
  podAnnotations: {}
  
  # Image pull secrets for NFS server (if registry requires authentication)
  imagePullSecrets: []
