{{- if .Values.crds.installSpdkCRDs }}
# SPDK-specific CRDs for the Flint CSI Driver
# These are required for the CSI driver to function and should almost always be installed

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: spdkvolumes.flint.csi.storage.io
  annotations:
    "helm.sh/resource-policy": keep
spec:
  group: flint.csi.storage.io
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required:
            - volume_id
            - size_bytes
            - num_replicas
            - replicas
            - write_ordering_enabled
            - raid_auto_rebuild
            properties:
              volume_id:
                type: string
              size_bytes:
                type: integer
                format: int64
              num_replicas:
                type: integer
              # SPDK volume management fields
              primary_lvol_uuid:
                type: string
                description: "UUID of the primary logical volume"
              write_ordering_enabled:
                type: boolean
                default: false
                description: "Whether write ordering is enabled for consistency"
              raid_auto_rebuild:
                type: boolean
                default: false
                description: "Whether RAID auto-rebuild is enabled"
              # NVMe-oF configuration
              nvmeof_transport:
                type: string
                description: "NVMe-oF transport protocol (tcp, rdma)"
              nvmeof_target_port:
                type: integer
                description: "Port number for NVMe-oF target"
              # Scheduling configuration
              scheduling_policy:
                type: string
                description: "Pod scheduling policy for this volume"
              preferred_nodes:
                type: array
                items:
                  type: string
                description: "List of preferred nodes for scheduling"
              replicas:
                type: array
                items:
                  type: object
                  required:
                  - node
                  - replica_type
                  - disk_ref
                  - health_status
                  - raid_member_index
                  - local_pod_scheduled
                  - write_sequence
                  - raid_member_state
                  properties:
                    node:
                      type: string
                    replica_type:
                      type: string
                      enum: ["primary", "secondary"]
                    disk_ref:
                      type: string
                    health_status:
                      type: string
                      enum: ["healthy", "degraded", "failed", "rebuilding", "syncing"]
                    raid_member_index:
                      type: integer
                    # NVMe-oF networking fields
                    pcie_addr:
                      type: string
                      description: "PCIe address of the NVMe device"
                    nqn:
                      type: string
                      description: "NVMe-oF Qualified Name for remote access"
                    ip:
                      type: string
                      description: "IP address for NVMe-oF target"
                    port:
                      type: string
                      description: "Port for NVMe-oF target"
                    # SPDK and scheduling fields
                    lvol_uuid:
                      type: string
                      description: "UUID of the logical volume in SPDK"
                    local_pod_scheduled:
                      type: boolean
                      default: false
                      description: "Whether pods can be scheduled locally to this replica"
                    pod_name:
                      type: string
                      description: "Name of pod currently using this replica"
                    # RAID and monitoring fields
                    raid_member_state:
                      type: string
                      enum: ["online", "offline", "degraded", "failed", "rebuilding", "spare", "removing"]
                      default: "online"
                      description: "State of this replica in RAID configuration"
                    last_io_timestamp:
                      type: string
                      format: date-time
                      description: "Timestamp of last I/O activity"
                    write_sequence:
                      type: integer
                      format: int64
                      default: 0
                      description: "Write sequence number for consistency"
          status:
            type: object
            properties:
              state:
                type: string
                enum: ["creating", "ready", "degraded", "failed", "deleting"]
              message:
                type: string
              targets:
                type: array
                items:
                  type: object
                  properties:
                    node_id:
                      type: string
                    bdev_name:
                      type: string
                    nvmf_target:
                      type: string
    subresources:
      status: {}    
    additionalPrinterColumns:
    - name: State
      type: string
      jsonPath: .status.state
    - name: Size
      type: string
      jsonPath: .spec.size_bytes
    - name: Replicas
      type: integer
      jsonPath: .spec.num_replicas
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: spdkvolumes
    singular: spdkvolume
    kind: SpdkVolume
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: spdksnapshots.flint.csi.storage.io
  annotations:
    "helm.sh/resource-policy": keep
spec:
  group: flint.csi.storage.io
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required:
            - source_volume_id
            - snapshot_name
            properties:
              source_volume_id:
                type: string
              snapshot_name:
                type: string
          status:
            type: object
            properties:
              state:
                type: string
                enum: ["creating", "ready", "failed", "deleting"]
              snapshot_id:
                type: string
              size:
                type: string
    subresources:
      status: {}    
    additionalPrinterColumns:
    - name: State
      type: string
      jsonPath: .status.state
    - name: Source
      type: string
      jsonPath: .spec.source_volume_id
    - name: Size
      type: string
      jsonPath: .status.size
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: spdksnapshots
    singular: spdksnapshot
    kind: SpdkSnapshot

---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: spdkraiddisks.flint.csi.storage.io
  annotations:
    "helm.sh/resource-policy": keep
spec:
  group: flint.csi.storage.io
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required:
            - raid_disk_id
            - raid_level
            - num_member_disks
            - member_disks
            - created_on_node
            - min_capacity_bytes
            properties:
              raid_disk_id:
                type: string
                description: "Unique identifier for this RAID disk"
              raid_level:
                type: string
                enum: ["raid1"]
                description: "RAID level (currently only RAID1 supported)"
              num_member_disks:
                type: integer
                minimum: 2
                description: "Number of member disks in the RAID"
              member_disks:
                type: array
                items:
                  type: object
                  required:
                  - disk_ref
                  - node_id
                  - state
                  - capacity_bytes
                  - connected
                  properties:
                    disk_ref:
                      type: string
                      description: "Reference to SpdkDisk CRD"
                    node_id:
                      type: string
                      description: "Node ID where member disk is located"
                    state:
                      type: string
                      enum: ["active", "failed", "rebuilding", "degraded"]
                      description: "Current state of the member disk"
                    capacity_bytes:
                      type: integer
                      format: int64
                      description: "Member disk capacity in bytes"
                    connected:
                      type: boolean
                      description: "Whether member disk is currently connected"
                    last_health_check:
                      type: string
                      nullable: true
                      description: "Last health check timestamp"
                description: "Array of member disks in the RAID"
              stripe_size_kb:
                type: integer
                default: 64
                description: "RAID stripe size in KB"
              superblock_enabled:
                type: boolean
                default: true
                description: "Whether RAID superblock is enabled"
              created_on_node:
                type: string
                description: "Node where RAID disk was created"
              min_capacity_bytes:
                type: integer
                format: int64
                description: "Minimum capacity of member disks in bytes"
              auto_rebuild:
                type: boolean
                default: true
                description: "Whether automatic rebuild is enabled"
          status:
            type: object
            properties:
              state:
                type: string
                enum: ["online", "degraded", "failed", "rebuilding"]
                description: "Overall RAID disk state"
              active_members:
                type: integer
                description: "Number of currently active member disks"
              total_capacity:
                type: integer
                format: int64
                description: "Total usable capacity in bytes"
              used_space:
                type: integer
                format: int64
                description: "Used space in bytes"
              free_space:
                type: integer
                format: int64
                description: "Free space in bytes"
              blobstore_initialized:
                type: boolean
                description: "Whether blobstore is initialized on RAID disk"
              last_rebuild:
                type: string
                nullable: true
                description: "Last rebuild timestamp"
    additionalPrinterColumns:
    - name: State
      type: string
      description: Current RAID state
      jsonPath: .status.state
    - name: Members
      type: string
      description: Active/Total members
      jsonPath: .status.active_members
    - name: Capacity
      type: string
      description: Total capacity
      jsonPath: .status.total_capacity
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: spdkraiddisks
    singular: spdkraiddisk
    kind: SpdkRaidDisk
{{- end }} 
