{{- if .Values.crds.installSpdkCRDs }}
# SPDK-specific CRDs for the Flint CSI Driver
# These are required for the CSI driver to function and should almost always be installed

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: spdkvolumes.flint.csi.storage.io
  annotations:
    "helm.sh/resource-policy": keep
spec:
  group: flint.csi.storage.io
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required:
            - volume_id
            - size_bytes
            - num_replicas
            - replicas
            - write_ordering_enabled
            - raid_auto_rebuild
            properties:
              volume_id:
                type: string
              size_bytes:
                type: integer
                format: int64
              num_replicas:
                type: integer
              # SPDK volume management fields
              primary_lvol_uuid:
                type: string
                description: "UUID of the primary logical volume"
              write_ordering_enabled:
                type: boolean
                default: false
                description: "Whether write ordering is enabled for consistency"
              raid_auto_rebuild:
                type: boolean
                default: false
                description: "Whether RAID auto-rebuild is enabled"
              # NVMe-oF configuration
              nvmeof_transport:
                type: string
                description: "NVMe-oF transport protocol (tcp, rdma)"
              nvmeof_target_port:
                type: integer
                description: "Port number for NVMe-oF target"
              # Scheduling configuration
              scheduling_policy:
                type: string
                description: "Pod scheduling policy for this volume"
              preferred_nodes:
                type: array
                items:
                  type: string
                description: "List of preferred nodes for scheduling"
              replicas:
                type: array
                items:
                  type: object
                  required:
                  - node
                  - replica_type
                  - disk_ref
                  - health_status
                  - raid_member_index
                  - local_pod_scheduled
                  - write_sequence
                  - raid_member_state
                  properties:
                    node:
                      type: string
                    replica_type:
                      type: string
                      enum: ["primary", "secondary"]
                    disk_ref:
                      type: string
                    health_status:
                      type: string
                      enum: ["healthy", "degraded", "failed", "rebuilding", "syncing"]
                    raid_member_index:
                      type: integer
                    # NVMe-oF networking fields
                    pcie_addr:
                      type: string
                      description: "PCIe address of the NVMe device"
                    nqn:
                      type: string
                      description: "NVMe-oF Qualified Name for remote access"
                    ip:
                      type: string
                      description: "IP address for NVMe-oF target"
                    port:
                      type: string
                      description: "Port for NVMe-oF target"
                    # SPDK and scheduling fields
                    lvol_uuid:
                      type: string
                      description: "UUID of the logical volume in SPDK"
                    local_pod_scheduled:
                      type: boolean
                      default: false
                      description: "Whether pods can be scheduled locally to this replica"
                    pod_name:
                      type: string
                      description: "Name of pod currently using this replica"
                    # RAID and monitoring fields
                    raid_member_state:
                      type: string
                      enum: ["online", "offline", "degraded", "failed", "rebuilding", "spare", "removing"]
                      default: "online"
                      description: "State of this replica in RAID configuration"
                    last_io_timestamp:
                      type: string
                      format: date-time
                      description: "Timestamp of last I/O activity"
                    write_sequence:
                      type: integer
                      format: int64
                      default: 0
                      description: "Write sequence number for consistency"
          status:
            type: object
            properties:
              state:
                type: string
                enum: ["creating", "ready", "degraded", "failed", "deleting"]
              message:
                type: string
              targets:
                type: array
                items:
                  type: object
                  properties:
                    node_id:
                      type: string
                    bdev_name:
                      type: string
                    nvmf_target:
                      type: string
    subresources:
      status: {}    
    additionalPrinterColumns:
    - name: State
      type: string
      jsonPath: .status.state
    - name: Size
      type: string
      jsonPath: .spec.size_bytes
    - name: Replicas
      type: integer
      jsonPath: .spec.num_replicas
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: spdkvolumes
    singular: spdkvolume
    kind: SpdkVolume
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: spdkdisks.flint.csi.storage.io
  annotations:
    "helm.sh/resource-policy": keep
spec:
  group: flint.csi.storage.io
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required:
            - device_path
            - node_id
            - size
            - pcie_addr
            - disk_id
            - serial_number
            - model
            - vendor
            properties:
              # Location-dependent fields (can change when disk moves)
              device_path:
                type: string
                description: "Current path to the device (e.g., /dev/nvme1n1)"
              node_id:
                type: string
                description: "Current Kubernetes node name where the disk is located"
              pcie_addr:
                type: string
                description: "Current PCIe address of the NVMe device (e.g., 0000:00:1f.0)"
              
              # Immutable disk identification (Portworx-style hardware identification)
              disk_id:
                type: string
                description: "Hardware disk ID from /dev/disk/by-id/ (e.g., nvme-Samsung_SSD_970_EVO_Plus_1TB_S4EWNX0R123456)"
              serial_number:
                type: string
                description: "NVMe serial number (primary hardware identifier)"
              wwn:
                type: string
                nullable: true
                description: "World Wide Name if available"
              model:
                type: string
                description: "Disk model"
              vendor:
                type: string
                description: "Disk vendor"
              
              # Flint disk metadata (with cluster safety for NVMe-oF scenarios)
              cluster_id:
                type: string
                nullable: true
                description: "Kubernetes cluster this disk belongs to (CRITICAL for NVMe-oF security)"
              disk_uuid:
                type: string
                nullable: true
                description: "Flint internal disk UUID (stored in blobstore)"
              pool_uuid:
                type: string
                nullable: true
                description: "Storage pool UUID"
              first_attached_node:
                type: string
                nullable: true
                description: "Node that first initialized this disk"
              initialized_at:
                type: string
                nullable: true
                description: "When disk joined the cluster (ISO 8601)"
              
              # Other fields
              size:
                type: string
                description: "Size of the disk (e.g., 1000GB)"
              blobstore_uuid:
                type: string
                nullable: true
                description: "UUID of the SPDK blobstore on this disk"
              nvme_controller_id:
                type: string
                nullable: true
                description: "NVMe controller ID (e.g., nvme1n1)"
              status:
                type: string
                nullable: true
                description: "Current disk status: online, offline, failed, missing, degraded"
              last_seen:
                type: string
                nullable: true
                description: "Last successful discovery timestamp (RFC3339)"
              health_status:
                type: string
                nullable: true
                description: "Health status: healthy, warning, critical"
              failure_reason:
                type: string
                nullable: true
                description: "Reason for failure or offline status"
          status:
            type: object
            properties:
              total_capacity:
                type: integer
                format: int64
                description: "Total capacity of the disk in bytes"
              free_space:
                type: integer
                format: int64
                description: "Available free space in bytes"
              used_space:
                type: integer
                format: int64
                description: "Used space in bytes"
              healthy:
                type: boolean
                description: "Whether the disk is healthy and operational"
              last_checked:
                type: string
                description: "Timestamp of the last health check"
              lvol_count:
                type: integer
                format: int32
                description: "Number of logical volumes on this disk"
              blobstore_initialized:
                type: boolean
                description: "Whether the SPDK blobstore has been initialized"
              io_stats:
                type: object
                description: "I/O statistics for this disk"
                properties:
                  read_iops:
                    type: integer
                    format: int64
                    description: "Read IOPS"
                  write_iops:
                    type: integer
                    format: int64
                    description: "Write IOPS"
                  read_latency_us:
                    type: integer
                    format: int64
                    description: "Read latency in microseconds"
                  write_latency_us:
                    type: integer
                    format: int64
                    description: "Write latency in microseconds"
                  error_count:
                    type: integer
                    format: int64
                    description: "Number of I/O errors"
              lvs_name:
                type: string
                nullable: true
                description: "Name of the logical volume store on this disk"
    subresources:
      status: {}    
    additionalPrinterColumns:
    - name: Healthy
      type: boolean
      jsonPath: .status.healthy
    - name: Node
      type: string
      jsonPath: .spec.node_id
    - name: Size
      type: string
      jsonPath: .spec.size
    - name: Device
      type: string
      jsonPath: .spec.device_path
    - name: Blobstore
      type: boolean
      jsonPath: .status.blobstore_initialized
    - name: Free
      type: string
      jsonPath: .status.free_space
    - name: LVols
      type: integer
      jsonPath: .status.lvol_count
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: spdkdisks
    singular: spdkdisk
    kind: SpdkDisk
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: spdksnapshots.flint.csi.storage.io
  annotations:
    "helm.sh/resource-policy": keep
spec:
  group: flint.csi.storage.io
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required:
            - source_volume_id
            - snapshot_name
            properties:
              source_volume_id:
                type: string
              snapshot_name:
                type: string
          status:
            type: object
            properties:
              state:
                type: string
                enum: ["creating", "ready", "failed", "deleting"]
              snapshot_id:
                type: string
              size:
                type: string
    subresources:
      status: {}    
    additionalPrinterColumns:
    - name: State
      type: string
      jsonPath: .status.state
    - name: Source
      type: string
      jsonPath: .spec.source_volume_id
    - name: Size
      type: string
      jsonPath: .status.size
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: spdksnapshots
    singular: spdksnapshot
    kind: SpdkSnapshot
{{- end }} 
