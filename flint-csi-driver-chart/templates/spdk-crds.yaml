{{- if .Values.crds.installSpdkCRDs }}
# SPDK-specific CRDs for the Flint CSI Driver
# These are required for the CSI driver to function and should almost always be installed

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: spdkvolumes.flint.csi.storage.io
  annotations:
    "helm.sh/resource-policy": keep
spec:
  group: flint.csi.storage.io
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required:
            - volume_id
            - size_bytes
            - num_replicas
            - replicas
            - write_ordering_enabled
            - raid_auto_rebuild
            properties:
              volume_id:
                type: string
              size_bytes:
                type: integer
                format: int64
              num_replicas:
                type: integer
              # SPDK volume management fields
              primary_lvol_uuid:
                type: string
                description: "UUID of the primary logical volume"
              write_ordering_enabled:
                type: boolean
                default: false
                description: "Whether write ordering is enabled for consistency"
              raid_auto_rebuild:
                type: boolean
                default: false
                description: "Whether RAID auto-rebuild is enabled"
              # NVMe-oF configuration
              nvmeof_transport:
                type: string
                description: "NVMe-oF transport protocol (tcp, rdma)"
              nvmeof_target_port:
                type: integer
                description: "Port number for NVMe-oF target"
              # Scheduling configuration
              scheduling_policy:
                type: string
                description: "Pod scheduling policy for this volume"
              preferred_nodes:
                type: array
                items:
                  type: string
                description: "List of preferred nodes for scheduling"
              replicas:
                type: array
                items:
                  type: object
                  required:
                  - node
                  - replica_type
                  - disk_ref
                  - health_status
                  - raid_member_index
                  - local_pod_scheduled
                  - write_sequence
                  - raid_member_state
                  properties:
                    node:
                      type: string
                    replica_type:
                      type: string
                      enum: ["primary", "secondary"]
                    disk_ref:
                      type: string
                    health_status:
                      type: string
                      enum: ["healthy", "degraded", "failed", "rebuilding", "syncing"]
                    raid_member_index:
                      type: integer
                    # NVMe-oF networking fields
                    pcie_addr:
                      type: string
                      description: "PCIe address of the NVMe device"
                    nqn:
                      type: string
                      description: "NVMe-oF Qualified Name for remote access"
                    ip:
                      type: string
                      description: "IP address for NVMe-oF target"
                    port:
                      type: string
                      description: "Port for NVMe-oF target"
                    # SPDK and scheduling fields
                    lvol_uuid:
                      type: string
                      description: "UUID of the logical volume in SPDK"
                    local_pod_scheduled:
                      type: boolean
                      default: false
                      description: "Whether pods can be scheduled locally to this replica"
                    pod_name:
                      type: string
                      description: "Name of pod currently using this replica"
                    # RAID and monitoring fields
                    raid_member_state:
                      type: string
                      enum: ["online", "offline", "degraded", "failed", "rebuilding", "spare", "removing"]
                      default: "online"
                      description: "State of this replica in RAID configuration"
                    last_io_timestamp:
                      type: string
                      format: date-time
                      description: "Timestamp of last I/O activity"
                    write_sequence:
                      type: integer
                      format: int64
                      default: 0
                      description: "Write sequence number for consistency"
          status:
            type: object
            properties:
              state:
                type: string
                enum: ["creating", "ready", "degraded", "failed", "deleting"]
              message:
                type: string
              targets:
                type: array
                items:
                  type: object
                  properties:
                    node_id:
                      type: string
                    bdev_name:
                      type: string
                    nvmf_target:
                      type: string
    subresources:
      status: {}    
    additionalPrinterColumns:
    - name: State
      type: string
      jsonPath: .status.state
    - name: Size
      type: string
      jsonPath: .spec.size_bytes
    - name: Replicas
      type: integer
      jsonPath: .spec.num_replicas
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: spdkvolumes
    singular: spdkvolume
    kind: SpdkVolume
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: spdkdisks.flint.csi.storage.io
  annotations:
    "helm.sh/resource-policy": keep
spec:
  group: flint.csi.storage.io
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required:
            - disk_type
            - node_id
            - nvmeof_target
            - disk_id
            - size_bytes
            properties:
              # Core disk type and access method
              disk_type:
                type: string
                enum: ["local", "remote"]
                description: "Type of disk: local physical disk or remote NVMe-oF disk"
              node_id:
                type: string
                description: "Node where disk is hosted (local) or accessed from (remote)"
              nvmeof_target:
                type: object
                required:
                - nqn
                - target_addr
                - target_port
                - transport
                - active
                properties:
                  nqn:
                    type: string
                    description: "NVMe Qualified Name"
                  target_addr:
                    type: string
                    description: "Target IP address"
                  target_port:
                    type: integer
                    description: "Target port number"
                  transport:
                    type: string
                    description: "Transport protocol (tcp/rdma)"
                  created_at:
                    type: string
                    nullable: true
                    description: "When target was created (for local disks)"
                  active:
                    type: boolean
                    description: "Whether target is currently active"
              
              # Physical disk fields (optional - only for local disks)
              device_path:
                type: string
                nullable: true
                description: "Local device path (e.g., /dev/nvme1n1) - local disks only"
              pcie_addr:
                type: string
                nullable: true
                description: "PCIe address (e.g., 0000:00:1f.0) - local disks only"
              
              # Immutable disk identification
              disk_id:
                type: string
                description: "Unique disk identifier (hardware ID for local, endpoint ID for remote)"
              serial_number:
                type: string
                nullable: true
                description: "NVMe serial number (local disks only)"
              wwn:
                type: string
                nullable: true
                description: "World Wide Name if available"
              model:
                type: string
                nullable: true
                description: "Disk model (local disks only)"
              vendor:
                type: string
                nullable: true
                description: "Disk vendor (local disks only)"
              
              # Flint disk metadata (with cluster safety for NVMe-oF scenarios)
              cluster_id:
                type: string
                nullable: true
                description: "Kubernetes cluster this disk belongs to (CRITICAL for NVMe-oF security)"
              disk_uuid:
                type: string
                nullable: true
                description: "Flint internal disk UUID (stored in blobstore)"
              pool_uuid:
                type: string
                nullable: true
                description: "Storage pool UUID"
              first_attached_node:
                type: string
                nullable: true
                description: "Node that first initialized this disk"
              initialized_at:
                type: string
                nullable: true
                description: "When disk joined the cluster (ISO 8601)"
              
              # Storage configuration
              size_bytes:
                type: integer
                format: int64
                description: "Disk size in bytes"
              blobstore_uuid:
                type: string
                nullable: true
                description: "UUID of the SPDK blobstore on this disk"
              status:
                type: string
                nullable: true
                description: "Current disk status: online, offline, failed, missing, degraded"
              last_seen:
                type: string
                nullable: true
                description: "Last successful discovery timestamp (RFC3339)"
              health_status:
                type: string
                nullable: true
                description: "Health status: healthy, warning, critical"
              failure_reason:
                type: string
                nullable: true
                description: "Reason for failure or offline status"
          status:
            type: object
            properties:
              total_capacity:
                type: integer
                format: int64
                description: "Total capacity of the disk in bytes"
              free_space:
                type: integer
                format: int64
                description: "Available free space in bytes"
              used_space:
                type: integer
                format: int64
                description: "Used space in bytes"
              healthy:
                type: boolean
                description: "Whether the disk is healthy and operational"
              last_checked:
                type: string
                description: "Timestamp of the last health check"
              lvol_count:
                type: integer
                format: int32
                description: "Number of logical volumes on this disk"
              blobstore_initialized:
                type: boolean
                description: "Whether the SPDK blobstore has been initialized"
              io_stats:
                type: object
                description: "I/O statistics for this disk"
                properties:
                  read_iops:
                    type: integer
                    format: int64
                    description: "Read IOPS"
                  write_iops:
                    type: integer
                    format: int64
                    description: "Write IOPS"
                  read_latency_us:
                    type: integer
                    format: int64
                    description: "Read latency in microseconds"
                  write_latency_us:
                    type: integer
                    format: int64
                    description: "Write latency in microseconds"
                  error_count:
                    type: integer
                    format: int64
                    description: "Number of I/O errors"
              lvs_name:
                type: string
                nullable: true
                description: "Name of the logical volume store on this disk"
    subresources:
      status: {}    
    additionalPrinterColumns:
    - name: Healthy
      type: boolean
      jsonPath: .status.healthy
    - name: Node
      type: string
      jsonPath: .spec.node_id
    - name: Size
      type: string
      jsonPath: .spec.size
    - name: Device
      type: string
      jsonPath: .spec.device_path
    - name: Blobstore
      type: boolean
      jsonPath: .status.blobstore_initialized
    - name: Free
      type: string
      jsonPath: .status.free_space
    - name: LVols
      type: integer
      jsonPath: .status.lvol_count
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: spdkdisks
    singular: spdkdisk
    kind: SpdkDisk
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: spdksnapshots.flint.csi.storage.io
  annotations:
    "helm.sh/resource-policy": keep
spec:
  group: flint.csi.storage.io
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required:
            - source_volume_id
            - snapshot_name
            properties:
              source_volume_id:
                type: string
              snapshot_name:
                type: string
          status:
            type: object
            properties:
              state:
                type: string
                enum: ["creating", "ready", "failed", "deleting"]
              snapshot_id:
                type: string
              size:
                type: string
    subresources:
      status: {}    
    additionalPrinterColumns:
    - name: State
      type: string
      jsonPath: .status.state
    - name: Source
      type: string
      jsonPath: .spec.source_volume_id
    - name: Size
      type: string
      jsonPath: .status.size
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: spdksnapshots
    singular: spdksnapshot
    kind: SpdkSnapshot

---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: spdkraiddisks.flint.csi.storage.io
  annotations:
    "helm.sh/resource-policy": keep
spec:
  group: flint.csi.storage.io
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required:
            - raid_disk_id
            - raid_level
            - num_member_disks
            - member_disks
            - created_on_node
            - min_capacity_bytes
            properties:
              raid_disk_id:
                type: string
                description: "Unique identifier for this RAID disk"
              raid_level:
                type: string
                enum: ["raid1"]
                description: "RAID level (currently only RAID1 supported)"
              num_member_disks:
                type: integer
                minimum: 2
                description: "Number of member disks in the RAID"
              member_disks:
                type: array
                items:
                  type: object
                  required:
                  - disk_ref
                  - node_id
                  - state
                  - capacity_bytes
                  - connected
                  properties:
                    disk_ref:
                      type: string
                      description: "Reference to SpdkDisk CRD"
                    node_id:
                      type: string
                      description: "Node ID where member disk is located"
                    state:
                      type: string
                      enum: ["active", "failed", "rebuilding", "degraded"]
                      description: "Current state of the member disk"
                    capacity_bytes:
                      type: integer
                      format: int64
                      description: "Member disk capacity in bytes"
                    connected:
                      type: boolean
                      description: "Whether member disk is currently connected"
                    last_health_check:
                      type: string
                      nullable: true
                      description: "Last health check timestamp"
                description: "Array of member disks in the RAID"
              stripe_size_kb:
                type: integer
                default: 64
                description: "RAID stripe size in KB"
              superblock_enabled:
                type: boolean
                default: true
                description: "Whether RAID superblock is enabled"
              created_on_node:
                type: string
                description: "Node where RAID disk was created"
              min_capacity_bytes:
                type: integer
                format: int64
                description: "Minimum capacity of member disks in bytes"
              auto_rebuild:
                type: boolean
                default: true
                description: "Whether automatic rebuild is enabled"
          status:
            type: object
            properties:
              state:
                type: string
                enum: ["online", "degraded", "failed", "rebuilding"]
                description: "Overall RAID disk state"
              active_members:
                type: integer
                description: "Number of currently active member disks"
              total_capacity:
                type: integer
                format: int64
                description: "Total usable capacity in bytes"
              used_space:
                type: integer
                format: int64
                description: "Used space in bytes"
              free_space:
                type: integer
                format: int64
                description: "Free space in bytes"
              blobstore_initialized:
                type: boolean
                description: "Whether blobstore is initialized on RAID disk"
              last_rebuild:
                type: string
                nullable: true
                description: "Last rebuild timestamp"
    additionalPrinterColumns:
    - name: State
      type: string
      description: Current RAID state
      jsonPath: .status.state
    - name: Members
      type: string
      description: Active/Total members
      jsonPath: .status.active_members
    - name: Capacity
      type: string
      description: Total capacity
      jsonPath: .status.total_capacity
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: spdkraiddisks
    singular: spdkraiddisk
    kind: SpdkRaidDisk
{{- end }} 
