{{- if .Values.crds.installSpdkCRDs }}
# SPDK-specific CRDs for the Flint CSI Driver
# These are required for the CSI driver to function and should almost always be installed

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: spdkvolumes.flint.csi.storage.io
  annotations:
    "helm.sh/resource-policy": keep
spec:
  group: flint.csi.storage.io
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required:
            - volume_id
            - size_bytes
            - num_replicas
            - replicas
            - write_ordering_enabled
            - raid_auto_rebuild
            - storage_backend
            properties:
              volume_id:
                type: string
              size_bytes:
                type: integer
                format: int64
              num_replicas:
                type: integer
              # Storage backend configuration (RAID disk reference)
              storage_backend:
                type: object
                description: "Storage backend configuration (RAID or single disk)"
                required:
                - type
                properties:
                  type:
                    type: string
                    description: "Type of storage backend"
                    enum: ["raiddisk"]
                  raid_disk_ref:
                    type: string
                    description: "Reference to the SpdkRaidDisk CRD name"
                  node_id:
                    type: string
                    description: "Node where the RAID disk is created"
              # SPDK volume management fields
              primary_lvol_uuid:
                type: string
                description: "UUID of the primary logical volume"
              write_ordering_enabled:
                type: boolean
                default: false
                description: "Whether write ordering is enabled for consistency"
              raid_auto_rebuild:
                type: boolean
                default: false
                description: "Whether RAID auto-rebuild is enabled"
              # NVMe-oF configuration
              nvmeof_transport:
                type: string
                description: "NVMe-oF transport protocol (tcp, rdma)"
              nvmeof_target_port:
                type: integer
                description: "Port number for NVMe-oF target"
              # Scheduling configuration
              scheduling_policy:
                type: string
                description: "Pod scheduling policy for this volume"
              preferred_nodes:
                type: array
                items:
                  type: string
                description: "List of preferred nodes for scheduling"
              replicas:
                type: array
                items:
                  type: object
                  required:
                  - node
                  - replica_type
                  - disk_ref
                  - health_status
                  - raid_member_index
                  - local_pod_scheduled
                  - write_sequence
                  - raid_member_state
                  properties:
                    node:
                      type: string
                    replica_type:
                      type: string
                      enum: ["primary", "secondary"]
                    disk_ref:
                      type: string
                    health_status:
                      type: string
                      enum: ["healthy", "degraded", "failed", "rebuilding", "syncing"]
                    raid_member_index:
                      type: integer
                    # NVMe-oF networking fields
                    pcie_addr:
                      type: string
                      description: "PCIe address of the NVMe device"
                    nqn:
                      type: string
                      description: "NVMe-oF Qualified Name for remote access"
                    ip:
                      type: string
                      description: "IP address for NVMe-oF target"
                    port:
                      type: string
                      description: "Port for NVMe-oF target"
                    # SPDK and scheduling fields
                    lvol_uuid:
                      type: string
                      description: "UUID of the logical volume in SPDK"
                    local_pod_scheduled:
                      type: boolean
                      default: false
                      description: "Whether pods can be scheduled locally to this replica"
                    pod_name:
                      type: string
                      description: "Name of pod currently using this replica"
                    # RAID and monitoring fields
                    raid_member_state:
                      type: string
                      enum: ["online", "offline", "degraded", "failed", "rebuilding", "spare", "removing"]
                      default: "online"
                      description: "State of this replica in RAID configuration"
                    last_io_timestamp:
                      type: string
                      format: date-time
                      description: "Timestamp of last I/O activity"
                    write_sequence:
                      type: integer
                      format: int64
                      default: 0
                      description: "Write sequence number for consistency"
          status:
            type: object
            properties:
              state:
                type: string
                enum: ["creating", "ready", "degraded", "failed", "deleting"]
              message:
                type: string
              targets:
                type: array
                items:
                  type: object
                  properties:
                    node_id:
                      type: string
                    bdev_name:
                      type: string
                    nvmf_target:
                      type: string
    subresources:
      status: {}    
    additionalPrinterColumns:
    - name: State
      type: string
      jsonPath: .status.state
    - name: Size
      type: string
      jsonPath: .spec.size_bytes
    - name: Replicas
      type: integer
      jsonPath: .spec.num_replicas
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: spdkvolumes
    singular: spdkvolume
    kind: SpdkVolume
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: spdksnapshots.flint.csi.storage.io
  annotations:
    "helm.sh/resource-policy": keep
spec:
  group: flint.csi.storage.io
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required:
            - source_volume_id
            - snapshot_name
            properties:
              source_volume_id:
                type: string
              snapshot_name:
                type: string
          status:
            type: object
            properties:
              state:
                type: string
                enum: ["creating", "ready", "failed", "deleting"]
              snapshot_id:
                type: string
              size:
                type: string
    subresources:
      status: {}    
    additionalPrinterColumns:
    - name: State
      type: string
      jsonPath: .status.state
    - name: Source
      type: string
      jsonPath: .spec.source_volume_id
    - name: Size
      type: string
      jsonPath: .status.size
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: spdksnapshots
    singular: spdksnapshot
    kind: SpdkSnapshot

---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: spdkraiddisks.flint.csi.storage.io
  annotations:
    "helm.sh/resource-policy": keep
spec:
  group: flint.csi.storage.io
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required:
            - raid_disk_id
            - raid_level
            - num_member_disks
            - member_disks
            - created_on_node
            - min_capacity_bytes
            properties:
              raid_disk_id:
                type: string
                description: "Unique identifier for this RAID disk"
              raid_level:
                type: string
                enum: ["raid1"]
                description: "RAID level (currently only RAID1 supported)"
              num_member_disks:
                type: integer
                minimum: 1
                description: "Number of member disks in the RAID (1 for single-disk, 2+ for multi-disk)"
              member_disks:
                type: array
                items:
                  type: object
                  required:
                  - member_index
                  - disk_ref
                  - node_id
                  - state
                  - capacity_bytes
                  - connected
                  properties:
                    member_index:
                      type: integer
                      format: int32
                      description: "Position in RAID array (0, 1, 2...)"
                    disk_ref:
                      type: string
                      description: "Reference to SpdkDisk CRD or bdev name"
                    node_id:
                      type: string
                      description: "Node ID where member disk is located"
                    hardware_id:
                      type: string
                      nullable: true
                      description: "Hardware ID for local disks"
                    serial_number:
                      type: string
                      nullable: true
                      description: "Serial number of the disk"
                    wwn:
                      type: string
                      nullable: true
                      description: "World Wide Name of the disk"
                    model:
                      type: string
                      nullable: true
                      description: "Model name of the disk"
                    vendor:
                      type: string
                      nullable: true
                      description: "Vendor name of the disk"
                    nvmeof_endpoint:
                      type: object
                      description: "NVMe-oF endpoint configuration"
                      properties:
                        nqn:
                          type: string
                          description: "NQN identifier"
                        target_addr:
                          type: string
                          description: "Target address"
                        target_port:
                          type: integer
                          description: "Target port"
                        transport:
                          type: string
                          description: "Transport protocol"
                        created_at:
                          type: string
                          nullable: true
                          description: "Creation timestamp"
                        active:
                          type: boolean
                          description: "Whether endpoint is active"
                      required: ["nqn", "target_addr", "target_port", "transport", "active"]
                    state:
                      type: string
                      enum: ["online", "active", "failed", "rebuilding", "degraded"]
                      description: "Current state of the member disk"
                    capacity_bytes:
                      type: integer
                      format: int64
                      description: "Member disk capacity in bytes"
                    connected:
                      type: boolean
                      description: "Whether member disk is currently connected"
                    last_health_check:
                      type: string
                      nullable: true
                      description: "Last health check timestamp"
                    binding_approach:
                      type: string
                      nullable: true
                      enum: ["userspace-nvme", "aio-fallback", "nvmeof"]
                      description: "Disk binding approach: userspace-nvme (bdev_nvme_attach_controller), aio-fallback (bdev_aio_create), or nvmeof (remote disk)"
                description: "Array of member disks in the RAID"
              stripe_size_kb:
                type: integer
                default: 64
                description: "RAID stripe size in KB"
              superblock_enabled:
                type: boolean
                default: true
                description: "Whether RAID superblock is enabled"
              created_on_node:
                type: string
                description: "Node where RAID disk was created"
              min_capacity_bytes:
                type: integer
                format: int64
                description: "Minimum capacity of member disks in bytes"
              auto_rebuild:
                type: boolean
                default: true
                description: "Whether automatic rebuild is enabled"
          status:
            type: object
            properties:
              state:
                type: string
                enum: ["creating", "initializing", "bdev_created", "online", "degraded", "failed", "rebuilding"]
                description: "Overall RAID disk state"
              raid_bdev_name:
                type: string
                nullable: true
                description: "SPDK RAID bdev name"
              lvs_name:
                type: string
                nullable: true
                description: "LVS created on this RAID disk"
              lvs_uuid:
                type: string
                nullable: true
                description: "LVS UUID"
              total_capacity_bytes:
                type: integer
                format: int64
                description: "Total RAID capacity in bytes"
              usable_capacity_bytes:
                type: integer
                format: int64
                description: "Available capacity for volumes in bytes"
              used_capacity_bytes:
                type: integer
                format: int64
                description: "Capacity used by volumes in bytes"
              health_status:
                type: string
                description: "Health status of the RAID disk"
              degraded:
                type: boolean
                description: "Whether RAID is in degraded state"
              rebuild_progress:
                type: number
                nullable: true
                description: "Rebuild progress percentage (0.0-100.0)"
              active_member_count:
                type: integer
                format: int32
                description: "Number of active members"
              failed_member_count:
                type: integer
                format: int32
                description: "Number of failed members"
              last_checked:
                type: string
                description: "Last health check timestamp"
              created_at:
                type: string
                nullable: true
                description: "When RAID disk was created"
              raid_status:
                type: object
                nullable: true
                description: "Detailed RAID status from SPDK"
                properties:
                  raid_level:
                    type: integer
                    format: int32
                  state:
                    type: string
                  num_base_bdevs:
                    type: integer
                    format: int32
                  num_base_bdevs_discovered:
                    type: integer
                    format: int32
                  num_base_bdevs_operational:
                    type: integer
                    format: int32
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: State
      type: string
      description: Current RAID state
      jsonPath: .status.state
    - name: Members
      type: string
      description: Active/Total members
      jsonPath: .status.active_member_count
    - name: Capacity
      type: string
      description: Total capacity
      jsonPath: .status.total_capacity_bytes
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: spdkraiddisks
    singular: spdkraiddisk
    kind: SpdkRaidDisk
{{- end }} 
