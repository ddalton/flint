{{- if .Values.crds.installSpdkCRDs }}
# SPDK-specific CRDs for the Flint CSI Driver
# These are required for the CSI driver to function and should almost always be installed

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: spdkvolumes.flint.csi.storage.io
  annotations:
    "helm.sh/resource-policy": keep
spec:
  group: flint.csi.storage.io
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required:
            - volume_id
            - size_bytes
            - num_replicas
            - replicas
            properties:
              volume_id:
                type: string
              size_bytes:
                type: integer
                format: int64
              num_replicas:
                type: integer
              replicas:
                type: array
                items:
                  type: object
                  required:
                  - node
                  - replica_type
                  - disk_ref
                  - health_status
                  - raid_member_index
                  properties:
                    node:
                      type: string
                    replica_type:
                      type: string
                      enum: ["primary", "secondary"]
                    disk_ref:
                      type: string
                    health_status:
                      type: string
                      enum: ["healthy", "degraded", "failed"]
                    raid_member_index:
                      type: integer
          status:
            type: object
            properties:
              state:
                type: string
                enum: ["creating", "ready", "degraded", "failed", "deleting"]
              message:
                type: string
              targets:
                type: array
                items:
                  type: object
                  properties:
                    node_id:
                      type: string
                    bdev_name:
                      type: string
                    nvmf_target:
                      type: string
    additionalPrinterColumns:
    - name: State
      type: string
      jsonPath: .status.state
    - name: Size
      type: string
      jsonPath: .spec.size_bytes
    - name: Replicas
      type: integer
      jsonPath: .spec.num_replicas
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: spdkvolumes
    singular: spdkvolume
    kind: SpdkVolume
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: spdkdisks.flint.csi.storage.io
  annotations:
    "helm.sh/resource-policy": keep
spec:
  group: flint.csi.storage.io
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required:
            - device_path
            - node_id
            - size
            properties:
              device_path:
                type: string
              node_id:
                type: string
              size:
                type: string
          status:
            type: object
            properties:
              state:
                type: string
                enum: ["available", "claimed", "failed", "initializing"]
              bdev_name:
                type: string
              cluster_id:
                type: string
    additionalPrinterColumns:
    - name: State
      type: string
      jsonPath: .status.state
    - name: Node
      type: string
      jsonPath: .spec.node_id
    - name: Size
      type: string
      jsonPath: .spec.size
    - name: Device
      type: string
      jsonPath: .spec.device_path
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: spdkdisks
    singular: spdkdisk
    kind: SpdkDisk
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: spdksnapshots.flint.csi.storage.io
  annotations:
    "helm.sh/resource-policy": keep
spec:
  group: flint.csi.storage.io
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required:
            - source_volume_id
            - snapshot_name
            properties:
              source_volume_id:
                type: string
              snapshot_name:
                type: string
          status:
            type: object
            properties:
              state:
                type: string
                enum: ["creating", "ready", "failed", "deleting"]
              snapshot_id:
                type: string
              size:
                type: string
    additionalPrinterColumns:
    - name: State
      type: string
      jsonPath: .status.state
    - name: Source
      type: string
      jsonPath: .spec.source_volume_id
    - name: Size
      type: string
      jsonPath: .status.size
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: spdksnapshots
    singular: spdksnapshot
    kind: SpdkSnapshot
{{- end }} 