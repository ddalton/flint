# This YAML file defines the resources that run on each node in the cluster.
# These resources are responsible for managing Flint volumes on the node.

# The DaemonSet for the Flint CSI node driver.
# This DaemonSet ensures that the Flint CSI node driver is running on every node in the cluster.
# Controller reaches node agents via pod IP (queried from Kubernetes API)
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: flint-csi-node
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: flint-csi-node
  template:
    metadata:
      labels:
        app: flint-csi-node
    spec:
      serviceAccountName: flint-csi-node
      hostNetwork: true
      terminationGracePeriodSeconds: 30
      # CSI node plugin must never be evicted: a kubelet DiskPressure eviction
      # of this pod kills spdk-tgt under live mounts (EIO for every flint PVC
      # on the node). Found live in the 2026-07 attach/detach chaos campaign
      # (finding F2, docs/attach-detach-campaign-2026-07.md).
      priorityClassName: {{ .Values.node.priorityClassName | default "system-node-critical" }}
      securityContext: {}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if eq (.Values.deployment.nodeMode | default "three-container") "nfs-only" }}
      # NFS-only mode: No SPDK sidecar, all volumes served via NFS with emptyDir backing
      # Saves ~3GB RAM per node — suitable for Kind/dev clusters
      containers:
        - name: flint-csi-driver
          image: "{{ .Values.images.repository }}/{{ .Values.images.flintCsiDriver.name }}:{{ .Values.images.flintCsiDriver.tag }}"
          imagePullPolicy: Always
          env:
            - name: CSI_MODE
              value: "node"
            - name: CSI_ENDPOINT
              value: "unix:///csi/csi.sock"
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: USE_HOSTNAME_TOPOLOGY
              value: "{{ .Values.driver.useHostnameTopology }}"
            - name: LOG_LEVEL
              value: "{{ .Values.logging.level | default "info" }}"
            - name: HEALTH_PORT
              value: "{{ .Values.healthCheck.csiDriverPort | default 9809 }}"
            - name: NODE_AGENT_PORT
              value: "{{ .Values.healthCheck.nodeAgentPort | default 9081 }}"
          ports:
            - name: healthz
              containerPort: {{ .Values.healthCheck.csiDriverPort | default 9809 }}
              protocol: TCP
            - name: node-api
              containerPort: {{ .Values.healthCheck.nodeAgentPort | default 9081 }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 10
            timeoutSeconds: 3
            periodSeconds: 10
            failureThreshold: 5
          securityContext:
            privileged: true
          volumeMounts:
            - name: kubelet-dir
              mountPath: /var/lib/kubelet
              mountPropagation: "Bidirectional"
            - name: plugin-dir
              mountPath: /csi
      {{- else if .Values.deployment.nodeMode | default "three-container" | eq "three-container" }}
      # SPDK sidecar container - starts before main containers and keeps running
      initContainers:
        - name: spdk-tgt
          restartPolicy: Always  # Native sidecar: starts first, stays running
          {{- if .Values.spdkTarget.kindMode.enabled }}
          image: "{{ .Values.images.repository }}/{{ .Values.spdkTarget.kindMode.image.name }}:{{ .Values.spdkTarget.kindMode.image.tag }}"
          {{- else }}
          image: "{{ .Values.images.repository }}/{{ .Values.images.spdkTarget.name }}:{{ .Values.images.spdkTarget.tag }}"
          {{- end }}
          imagePullPolicy: Always
          {{- if and (eq (.Values.blockDevice.backend | default "ublk") "ublk") (not .Values.spdkTarget.kindMode.enabled) }}
          # ublk mode: spdk_tgt must die UNCLEANLY on pod stop — its graceful
          # SIGTERM fini STOP_DEVs every ublk disk, deleting the kernel
          # gendisks live mounts sit on (drill 1u/1.9b). And PID-1 signal
          # immunity means nothing inside the container can SIGKILL an
          # exec'd spdk_tgt (spdk_kill_instance SIGKILL returns true and
          # kills nothing). So run it as a CHILD of a shell PID 1 whose
          # TERM trap SIGKILLs it: devices quiesce (UBLK_F_USER_RECOVERY)
          # and the next agent recovers them in place, mounts intact.
          command: ["/bin/bash", "-c"]
          args:
            - |
              /usr/local/bin/spdk-csi-start.sh {{ range .Values.spdkTarget.extraArgs }}{{ . | quote }} {{ end }}&
              C=$!
              trap 'kill -9 $C 2>/dev/null' TERM INT
              wait $C
          {{- else if or .Values.spdkTarget.kindMode.enabled .Values.spdkTarget.extraArgs }}
          args:
            {{- if .Values.spdkTarget.kindMode.enabled }}
            - "--no-huge"
            - "-s"
            - {{ .Values.spdkTarget.kindMode.spdkMemoryMB | quote }}
            - "--no-pci"
            - "--interrupt-mode"
            {{- end }}
            {{- range .Values.spdkTarget.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          {{- end }}
          env:
            - name: SPDK_VERSION
              value: "v25.05.x"
            {{- if and .Values.spdkTarget.kindMode.enabled (gt (int .Values.spdkTarget.kindMode.virtualDisk.sizeMB) 0) }}
            - name: VIRTUAL_DISK_SIZE_MB
              value: {{ .Values.spdkTarget.kindMode.virtualDisk.sizeMB | quote }}
            - name: VIRTUAL_DISK_PATH
              value: {{ .Values.spdkTarget.kindMode.virtualDisk.path | quote }}
            - name: VIRTUAL_DISK_LVS_NAME
              value: {{ .Values.spdkTarget.kindMode.virtualDisk.lvsName | quote }}
            {{- end }}
          securityContext:
            privileged: true
            capabilities:
              add:
                - SYS_ADMIN
                - SYS_RAWIO
          startupProbe:
            exec:
              command:
                {{- if .Values.spdkTarget.kindMode.enabled }}
                - test
                - -f
                - /var/tmp/spdk.ready
                {{- else }}
                - test
                - -S
                - /var/tmp/spdk.sock
                {{- end }}
            initialDelaySeconds: 1
            periodSeconds: 1
            failureThreshold: {{ if .Values.spdkTarget.kindMode.enabled }}120{{ else }}60{{ end }}
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    echo "[$(date)] preStop: Initiating graceful SPDK shutdown..."
                    python3 -c '
                    import socket, json, time

                    def spdk_rpc(method, params=None):
                        s = socket.socket(socket.AF_UNIX)
                        s.settimeout(10)
                        s.connect("/var/tmp/spdk.sock")
                        rpc = {"jsonrpc": "2.0", "id": 1, "method": method}
                        if params is not None:
                            rpc["params"] = params
                        s.send((json.dumps(rpc) + "\n").encode())
                        resp = json.loads(s.recv(65536).decode())
                        s.close()
                        if "error" in resp:
                            raise Exception(resp["error"])
                        return resp.get("result")

                    backend = "{{ .Values.blockDevice.backend | default "ublk" }}"
                    if backend == "ublk":
                        # ublk mode: ANY graceful SPDK exit (our explicit
                        # stops, or SPDK fini on SIGTERM) STOP_DEVs every
                        # disk — deleting the kernel gendisks that live
                        # stage mounts sit on. A graceful DS roll thereby
                        # killed every ublk-backed mount on the node
                        # permanently (chaos drill 1u/1.9b; a fresh start
                        # mints a NEW device the old mount cannot follow).
                        # With UBLK_F_USER_RECOVERY (kernel 6.18+/SPDK
                        # v26.05) the correct roll is an UNCLEAN kill: the
                        # devices quiesce, mounts survive, and the next
                        # agent recovers them in place (the ublk analog of
                        # the kernel-initiator reconnect that makes
                        # nvmeof-mode rolls survivable). Dirty blobstore
                        # restarts are the F5-hardened, drill-1.9-proven
                        # path.
                        # NOT via spdk_kill_instance: its sig_name decoder
                        # silently no-ops on "SIGKILL" (the RPC returns true
                        # and nothing dies — found live: the tgt survived the
                        # "kill" and k8s SIGTERM then ran the graceful fini,
                        # STOP_DEVing every disk). PID 1 IS spdk_tgt (exec'd
                        # by the entrypoint), so kill it directly.
                        # No RPC/self kill here: spdk_tgt as PID 1 ignores
                        # even SIGKILL from inside its own pid namespace.
                        # The ublk-mode entrypoint wrapper runs spdk_tgt as
                        # a CHILD and converts the container SIGTERM into
                        # SIGKILL of it — devices quiesce there.
                        print(f"[{time.strftime(\"%c\")}] preStop: ublk backend - no-op (entrypoint trap SIGKILLs spdk_tgt on TERM)")
                        raise SystemExit(0)

                    try:
                        print(f"[{time.strftime(\"%c\")}] preStop: Step 2 - Deleting NVMe-oF subsystems...")
                        # Get all NVMe-oF subsystems
                        subsystems = spdk_rpc("nvmf_get_subsystems") or []
                        deleted_count = 0
                        for subsys in subsystems:
                            nqn = subsys.get("nqn", "")
                            # Skip discovery subsystem
                            if "discovery" not in nqn.lower() and "nqn.2024" in nqn:
                                try:
                                    spdk_rpc("nvmf_delete_subsystem", {"nqn": nqn})
                                    deleted_count += 1
                                    print(f"  Deleted subsystem: {nqn}")
                                except:
                                    pass
                        print(f"[{time.strftime(\"%c\")}] preStop: Deleted {deleted_count} NVMe-oF subsystems")
                        time.sleep(1)

                        print(f"[{time.strftime(\"%c\")}] preStop: Step 3 - Sending SIGTERM to SPDK...")
                        spdk_rpc("spdk_kill_instance", {"sig_name": "SIGTERM"})
                        print(f"[{time.strftime(\"%c\")}] preStop: SPDK shutdown initiated")

                        # Give SPDK time to unload LVS and flush blobstore metadata
                        # After stopping ublk devices, LVS can be cleanly unloaded
                        # Blobstore flush: ~5s, thread cleanup: ~5s
                        time.sleep(12)
                        print(f"[{time.strftime(\"%c\")}] preStop: Graceful shutdown complete")
                    except Exception as e:
                        print(f"[{time.strftime(\"%c\")}] preStop: Shutdown failed (SPDK may already be down): {e}")
                    '
          resources:
            limits:
              {{- if and .Values.spdkTarget.hugepages.enabled (not .Values.spdkTarget.kindMode.enabled) }}
              hugepages-{{ .Values.spdkTarget.hugepages.size }}: {{ .Values.spdkTarget.hugepages.amount | quote }}
              {{- end }}
              {{- if .Values.spdkTarget.kindMode.enabled }}
              memory: {{ .Values.spdkTarget.kindMode.memory.limit | quote }}
              {{- else }}
              memory: {{ .Values.spdkTarget.memory.limit | quote }}
              {{- end }}
            requests:
              {{- if and .Values.spdkTarget.hugepages.enabled (not .Values.spdkTarget.kindMode.enabled) }}
              hugepages-{{ .Values.spdkTarget.hugepages.size }}: {{ .Values.spdkTarget.hugepages.amount | quote }}
              {{- end }}
              {{- if .Values.spdkTarget.kindMode.enabled }}
              memory: {{ .Values.spdkTarget.kindMode.memory.request | quote }}
              {{- else }}
              memory: {{ .Values.spdkTarget.memory.request | quote }}
              {{- end }}
          volumeMounts:
            {{- if and .Values.spdkTarget.hugepages.enabled (not .Values.spdkTarget.kindMode.enabled) }}
            - name: hugepages
              mountPath: /hugepages
            {{- end }}
            - name: spdk-socket
              mountPath: /var/tmp
            - name: device-dir
              mountPath: /dev
              mountPropagation: "HostToContainer"
            - name: kubelet-dir
              mountPath: /var/lib/kubelet
              mountPropagation: "Bidirectional"
      containers:
        # CSI Driver Container (Node Mode) - Includes integrated node agent on port {{ .Values.healthCheck.nodeAgentPort | default 9081 }}
        - name: flint-csi-driver
          image: "{{ .Values.images.repository }}/{{ .Values.images.flintCsiDriver.name }}:{{ .Values.images.flintCsiDriver.tag }}"
          imagePullPolicy: Always
          env:
            - name: CSI_MODE
              value: "node"
            - name: CSI_ENDPOINT
              value: "unix:///csi/csi.sock"
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: SPDK_RPC_URL
              value: "unix:///var/tmp/spdk.sock"
            - name: USE_HOSTNAME_TOPOLOGY
              value: "{{ .Values.driver.useHostnameTopology }}"
            - name: LOG_LEVEL
              value: "{{ .Values.logging.level | default "info" }}"
            - name: HEALTH_PORT
              value: "{{ .Values.healthCheck.csiDriverPort | default 9809 }}"
            - name: DEVICE_DISCOVERY_MODE
              value: "{{ .Values.blockDevice.discoveryMode | default "nvme" }}"
            - name: BLOCK_DEVICE_BACKEND
              value: "{{ .Values.blockDevice.backend | default "ublk" }}"
            - name: UBLK_NUM_QUEUES
              value: "{{ .Values.blockDevice.ublk.numQueues | default 4 }}"
            - name: UBLK_QUEUE_DEPTH
              value: "{{ .Values.blockDevice.ublk.queueDepth | default 256 }}"
            - name: NODE_AGENT_PORT
              value: "{{ .Values.healthCheck.nodeAgentPort | default 9081 }}"
            # F36c last-writer-set assembly gate
            # (docs/f36c-assembly-freshness-gate.md). "disabled" restores
            # pre-F36c serve-anything degraded assembly; the defer bound is
            # FLINT_F36C_DEFER_SECS (180) and the permanent-loss horizon is
            # FLINT_F36C_NODE_GONE_SECS (360), both env-overridable.
            - name: FLINT_F36C_GATE
              value: "{{ .Values.driver.f36cGate | default "enabled" }}"
          securityContext:
            privileged: true
            capabilities:
              add:
                - SYS_RAWIO  # Required for setpci to enable bus mastering on PCI devices
          ports:
            - name: healthz
              containerPort: {{ .Values.healthCheck.csiDriverPort | default 9809 }}
              protocol: TCP
            - name: node-api
              containerPort: {{ .Values.healthCheck.nodeAgentPort | default 9081 }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 30
            timeoutSeconds: 3
            periodSeconds: 10
            failureThreshold: 5
          volumeMounts:
            - name: kubelet-dir
              mountPath: /var/lib/kubelet
              mountPropagation: "Bidirectional"
            - name: plugin-dir
              mountPath: /csi
            - name: device-dir
              mountPath: /dev
              mountPropagation: "HostToContainer"
            - name: host-sys
              mountPath: /host/sys
              readOnly: true
            - name: spdk-socket
              mountPath: /var/tmp
          # Note: Node agent functionality is integrated into flint-csi-driver container above
          # The separate node-agent container has been removed to prevent port conflicts
      {{- else if .Values.deployment.nodeMode | eq "two-container" }}
      # SPDK sidecar container - starts before main containers and keeps running
      initContainers:
        - name: spdk-tgt
          restartPolicy: Always  # Native sidecar: starts first, stays running
          {{- if .Values.spdkTarget.kindMode.enabled }}
          image: "{{ .Values.images.repository }}/{{ .Values.spdkTarget.kindMode.image.name }}:{{ .Values.spdkTarget.kindMode.image.tag }}"
          {{- else }}
          image: "{{ .Values.images.repository }}/{{ .Values.images.spdkTarget.name }}:{{ .Values.images.spdkTarget.tag }}"
          {{- end }}
          imagePullPolicy: Always
          {{- if and (eq (.Values.blockDevice.backend | default "ublk") "ublk") (not .Values.spdkTarget.kindMode.enabled) }}
          # ublk mode: spdk_tgt must die UNCLEANLY on pod stop — its graceful
          # SIGTERM fini STOP_DEVs every ublk disk, deleting the kernel
          # gendisks live mounts sit on (drill 1u/1.9b). And PID-1 signal
          # immunity means nothing inside the container can SIGKILL an
          # exec'd spdk_tgt (spdk_kill_instance SIGKILL returns true and
          # kills nothing). So run it as a CHILD of a shell PID 1 whose
          # TERM trap SIGKILLs it: devices quiesce (UBLK_F_USER_RECOVERY)
          # and the next agent recovers them in place, mounts intact.
          command: ["/bin/bash", "-c"]
          args:
            - |
              /usr/local/bin/spdk-csi-start.sh {{ range .Values.spdkTarget.extraArgs }}{{ . | quote }} {{ end }}&
              C=$!
              trap 'kill -9 $C 2>/dev/null' TERM INT
              wait $C
          {{- else if or .Values.spdkTarget.kindMode.enabled .Values.spdkTarget.extraArgs }}
          args:
            {{- if .Values.spdkTarget.kindMode.enabled }}
            - "--no-huge"
            - "-s"
            - {{ .Values.spdkTarget.kindMode.spdkMemoryMB | quote }}
            - "--no-pci"
            - "--interrupt-mode"
            {{- end }}
            {{- range .Values.spdkTarget.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          {{- end }}
          env:
            - name: SPDK_VERSION
              value: "v25.05.x"
            {{- if and .Values.spdkTarget.kindMode.enabled (gt (int .Values.spdkTarget.kindMode.virtualDisk.sizeMB) 0) }}
            - name: VIRTUAL_DISK_SIZE_MB
              value: {{ .Values.spdkTarget.kindMode.virtualDisk.sizeMB | quote }}
            - name: VIRTUAL_DISK_PATH
              value: {{ .Values.spdkTarget.kindMode.virtualDisk.path | quote }}
            - name: VIRTUAL_DISK_LVS_NAME
              value: {{ .Values.spdkTarget.kindMode.virtualDisk.lvsName | quote }}
            {{- end }}
          securityContext:
            privileged: true
            capabilities:
              add:
                - SYS_ADMIN
                - SYS_RAWIO
          startupProbe:
            exec:
              command:
                {{- if .Values.spdkTarget.kindMode.enabled }}
                - test
                - -f
                - /var/tmp/spdk.ready
                {{- else }}
                - test
                - -S
                - /var/tmp/spdk.sock
                {{- end }}
            initialDelaySeconds: 1
            periodSeconds: 1
            failureThreshold: {{ if .Values.spdkTarget.kindMode.enabled }}120{{ else }}60{{ end }}
          resources:
            limits:
              {{- if and .Values.spdkTarget.hugepages.enabled (not .Values.spdkTarget.kindMode.enabled) }}
              hugepages-{{ .Values.spdkTarget.hugepages.size }}: {{ .Values.spdkTarget.hugepages.amount | quote }}
              {{- end }}
              {{- if .Values.spdkTarget.kindMode.enabled }}
              memory: {{ .Values.spdkTarget.kindMode.memory.limit | quote }}
              {{- else }}
              memory: {{ .Values.spdkTarget.memory.limit | quote }}
              {{- end }}
            requests:
              {{- if and .Values.spdkTarget.hugepages.enabled (not .Values.spdkTarget.kindMode.enabled) }}
              hugepages-{{ .Values.spdkTarget.hugepages.size }}: {{ .Values.spdkTarget.hugepages.amount | quote }}
              {{- end }}
              {{- if .Values.spdkTarget.kindMode.enabled }}
              memory: {{ .Values.spdkTarget.kindMode.memory.request | quote }}
              {{- else }}
              memory: {{ .Values.spdkTarget.memory.request | quote }}
              {{- end }}
          volumeMounts:
            {{- if and .Values.spdkTarget.hugepages.enabled (not .Values.spdkTarget.kindMode.enabled) }}
            - name: hugepages
              mountPath: /hugepages
            {{- end }}
            - name: spdk-socket
              mountPath: /var/tmp
            - name: device-dir
              mountPath: /dev
              mountPropagation: "HostToContainer"
            - name: kubelet-dir
              mountPath: /var/lib/kubelet
              mountPropagation: "Bidirectional"
      containers:
        # CSI Node Agent Container (Legacy - both CSI + Disk Management)
        - name: node-agent
          image: "{{ .Values.images.repository }}/{{ .Values.images.nodeAgent.name }}:{{ .Values.images.nodeAgent.tag }}"
          imagePullPolicy: Always
          env:
            - name: CSI_ENDPOINT
              value: "unix:///csi/csi.sock"
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: SPDK_RPC_URL
              value: "unix:///var/tmp/spdk.sock"
            - name: LOG_LEVEL
              value: "{{ .Values.logging.level | default "info" }}"
            - name: USE_HOSTNAME_TOPOLOGY
              value: "{{ .Values.driver.useHostnameTopology }}"
            - name: FLINT_NAMESPACE
              value: "{{ include "flint-csi-driver-chart.customResourceNamespace" . }}"
          securityContext:
            runAsUser: 65532
            runAsGroup: 0
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi
            - name: device-dir
              mountPath: /dev
              mountPropagation: "HostToContainer"
            - name: spdk-socket
              mountPath: /var/tmp
      {{- else }}
      # Legacy Embedded Mode (no separate SPDK sidecar)
      containers:
        # Legacy Embedded Mode Container (Single container with both SPDK + CSI)
        - name: flint-csi-driver
          image: "{{ .Values.images.repository }}/{{ .Values.images.flintCsiDriver.name }}:{{ .Values.images.flintCsiDriver.tag }}"
          imagePullPolicy: Always
          env:
            - name: CSI_MODE
              value: "node"
            - name: CSI_ENDPOINT
              value: "unix:///csi/csi.sock"
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: SPDK_MODE
              value: "embedded"
            - name: USE_HOSTNAME_TOPOLOGY
              value: "{{ .Values.driver.useHostnameTopology }}"
            - name: FLINT_NAMESPACE
              value: "{{ include "flint-csi-driver-chart.customResourceNamespace" . }}"
            - name: HEALTH_PORT
              value: "{{ .Values.healthCheck.csiDriverPort | default 9809 }}"
          securityContext:
            privileged: true
            capabilities:
              add:
                - SYS_RAWIO  # Required for setpci to enable bus mastering on PCI devices
          ports:
            - name: healthz
              containerPort: {{ .Values.healthCheck.csiDriverPort | default 9809 }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 60
            timeoutSeconds: 3
            periodSeconds: 10
            failureThreshold: 10
          volumeMounts:
            - name: kubelet-dir
              mountPath: /var/lib/kubelet
              mountPropagation: "Bidirectional"
            - name: plugin-dir
              mountPath: /csi
            - name: device-dir
              mountPath: /dev
              mountPropagation: "HostToContainer"
            - name: spdk-socket
              mountPath: /var/tmp
      {{- end }}
        - name: node-driver-registrar
          image: "{{ .Values.csiSidecars.repository }}/{{ .Values.csiSidecars.nodeDriverRegistrar.name }}:{{ .Values.csiSidecars.nodeDriverRegistrar.tag }}"
          imagePullPolicy: Always
          args:
            - "--v=5"
            - "--csi-address=/csi/csi.sock"
            - "--kubelet-registration-path=/var/lib/kubelet/plugins/flint.csi.storage.io/csi.sock"
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi
            - name: registration-dir
              mountPath: /registration
        - name: liveness-probe
          image: "{{ .Values.csiSidecars.repository }}/{{ .Values.csiSidecars.livenessprobe.name }}:{{ .Values.csiSidecars.livenessprobe.tag }}"
          imagePullPolicy: Always
          args:
            - "--csi-address=/csi/csi.sock"
            - "--health-port=9898"
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi
      volumes:
        - name: kubelet-dir
          hostPath:
            path: /var/lib/kubelet
            type: Directory
        - name: plugin-dir
          hostPath:
            path: /var/lib/kubelet/plugins/flint.csi.storage.io
            type: DirectoryOrCreate
        - name: registration-dir
          hostPath:
            path: /var/lib/kubelet/plugins_registry/
            type: Directory
        {{- if ne (.Values.deployment.nodeMode | default "three-container") "nfs-only" }}
        - name: device-dir
          hostPath:
            path: /dev
            type: Directory
        - name: sys-dir
          hostPath:
            path: /sys
            type: Directory
        - name: host-sys
          hostPath:
            path: /sys
            type: Directory
        {{- if and .Values.spdkTarget.hugepages.enabled (not .Values.spdkTarget.kindMode.enabled) }}
        - name: hugepages
          emptyDir:
            medium: HugePages
        {{- end }}
        - name: spdk-socket
          emptyDir: {}
        {{- end }}
