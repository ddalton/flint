# This YAML file defines the resources that run on each node in the cluster.
# These resources are responsible for managing Flint volumes on the node.

# The DaemonSet for the Flint CSI node driver.
# This DaemonSet ensures that the Flint CSI node driver is running on every node in the cluster.
# Controller reaches node agents via pod IP (queried from Kubernetes API)
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: flint-csi-node
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: flint-csi-node
  template:
    metadata:
      labels:
        app: flint-csi-node
    spec:
      serviceAccountName: flint-csi-node
      hostNetwork: true
      securityContext: {}
      containers:
        {{- if .Values.deployment.nodeMode | default "three-container" | eq "three-container" }}
        # SPDK Target Container (v25.05.x)
        - name: spdk-tgt
          image: "{{ .Values.images.repository }}/{{ .Values.images.spdkTarget.name }}:{{ .Values.images.spdkTarget.tag }}"
          imagePullPolicy: Always
          env:
            - name: SPDK_VERSION
              value: "v25.05.x"
          securityContext:
            privileged: true
            capabilities:
              add:
                - SYS_ADMIN
                - SYS_RAWIO
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    echo "[$(date)] preStop: Initiating graceful SPDK shutdown..."
                    python3 -c '
                    import socket, json, time
                    
                    def spdk_rpc(method, params=None):
                        s = socket.socket(socket.AF_UNIX)
                        s.settimeout(10)
                        s.connect("/var/tmp/spdk.sock")
                        rpc = json.dumps({"jsonrpc": "2.0", "id": 1, "method": method, "params": params or {}})
                        s.send((rpc + "\n").encode())
                        resp = json.loads(s.recv(65536).decode())
                        s.close()
                        return resp.get("result")
                    
                    try:
                        print(f"[{time.strftime(\"%c\")}] preStop: Step 1 - Deleting NVMe-oF subsystems...")
                        # Get all NVMe-oF subsystems
                        subsystems = spdk_rpc("nvmf_get_subsystems") or []
                        deleted_count = 0
                        for subsys in subsystems:
                            nqn = subsys.get("nqn", "")
                            # Skip discovery subsystem
                            if "discovery" not in nqn.lower() and "nqn.2024" in nqn:
                                try:
                                    spdk_rpc("nvmf_delete_subsystem", {"nqn": nqn})
                                    deleted_count += 1
                                    print(f"  Deleted subsystem: {nqn}")
                                except:
                                    pass
                        print(f"[{time.strftime(\"%c\")}] preStop: Deleted {deleted_count} NVMe-oF subsystems")
                        
                        # Small delay for cleanup
                        time.sleep(2)
                        
                        print(f"[{time.strftime(\"%c\")}] preStop: Step 2 - Sending SIGTERM to SPDK...")
                        spdk_rpc("spdk_kill_instance", {"sig_name": "SIGTERM"})
                        print(f"[{time.strftime(\"%c\")}] preStop: SPDK shutdown initiated")
                        
                        # Give SPDK time to unload LVS and flush metadata
                        # Thread timeout: 5s + blobstore unload: ~10s = 15s total
                        time.sleep(15)
                        print(f"[{time.strftime(\"%c\")}] preStop: Graceful shutdown complete")
                    except Exception as e:
                        print(f"[{time.strftime(\"%c\")}] preStop: Shutdown failed (SPDK may already be down): {e}")
                    '
          resources:
            limits:
              hugepages-2Mi: "1Gi"
              memory: "2Gi"
            requests:
              hugepages-2Mi: "1Gi" 
              memory: "1Gi"
          volumeMounts:
            - name: hugepages
              mountPath: /hugepages
            - name: spdk-socket
              mountPath: /var/tmp
            - name: device-dir
              mountPath: /dev
              mountPropagation: "HostToContainer"
            - name: kubelet-dir
              mountPath: /var/lib/kubelet
              mountPropagation: "Bidirectional"
        # CSI Driver Container (Node Mode) - Includes integrated node agent on port 8081
        - name: flint-csi-driver
          image: "{{ .Values.images.repository }}/{{ .Values.images.flintCsiDriver.name }}:{{ .Values.images.flintCsiDriver.tag }}"
          imagePullPolicy: Always
          env:
            - name: CSI_MODE
              value: "node"
            - name: CSI_ENDPOINT
              value: "unix:///csi/csi.sock"
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: SPDK_RPC_URL
              value: "unix:///var/tmp/spdk.sock"
            - name: USE_HOSTNAME_TOPOLOGY
              value: "{{ .Values.driver.useHostnameTopology }}"
            - name: LOG_LEVEL
              value: "{{ .Values.logging.level | default "info" }}"
            - name: HEALTH_PORT
              value: "{{ .Values.healthCheck.csiDriverPort | default 9809 }}"
          securityContext:
            privileged: true
          ports:
            - name: healthz
              containerPort: {{ .Values.healthCheck.csiDriverPort | default 9809 }}
              protocol: TCP
            - name: node-api
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 30
            timeoutSeconds: 3
            periodSeconds: 10
            failureThreshold: 5
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi
            - name: device-dir
              mountPath: /dev
              mountPropagation: "HostToContainer"
            - name: spdk-socket
              mountPath: /var/tmp
          # Note: Node agent functionality is integrated into flint-csi-driver container above
          # The separate node-agent container has been removed to prevent port conflicts
        {{- else if .Values.deployment.nodeMode | eq "two-container" }}
        # SPDK Target Container (v25.05.x)
        - name: spdk-tgt
          image: "{{ .Values.images.repository }}/{{ .Values.images.spdkTarget.name }}:{{ .Values.images.spdkTarget.tag }}"
          imagePullPolicy: Always
          env:
            - name: SPDK_VERSION
              value: "v25.05.x"
          securityContext:
            privileged: true
            capabilities:
              add:
                - SYS_ADMIN
                - SYS_RAWIO
          resources:
            limits:
              hugepages-2Mi: "1Gi"
              memory: "2Gi"
            requests:
              hugepages-2Mi: "1Gi" 
              memory: "1Gi"
          volumeMounts:
            - name: hugepages
              mountPath: /hugepages
            - name: spdk-socket
              mountPath: /var/tmp
            - name: device-dir
              mountPath: /dev
              mountPropagation: "HostToContainer"
            - name: kubelet-dir
              mountPath: /var/lib/kubelet
              mountPropagation: "Bidirectional"
        # CSI Node Agent Container (Legacy - both CSI + Disk Management)
        - name: node-agent
          image: "{{ .Values.images.repository }}/{{ .Values.images.nodeAgent.name }}:{{ .Values.images.nodeAgent.tag }}"
          imagePullPolicy: Always
          env:
            - name: CSI_ENDPOINT
              value: "unix:///csi/csi.sock"
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: SPDK_RPC_URL
              value: "unix:///var/tmp/spdk.sock"
            - name: LOG_LEVEL
              value: "{{ .Values.logging.level | default "info" }}"
            - name: USE_HOSTNAME_TOPOLOGY
              value: "{{ .Values.driver.useHostnameTopology }}"
            - name: FLINT_NAMESPACE
              value: "{{ include "flint-csi-driver-chart.customResourceNamespace" . }}"
          securityContext:
            runAsUser: 65532
            runAsGroup: 0
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi
            - name: device-dir
              mountPath: /dev
              mountPropagation: "HostToContainer"
            - name: spdk-socket
              mountPath: /var/tmp
        {{- else }}
        # Legacy Embedded Mode Container (Single container with both SPDK + CSI)
        - name: flint-csi-driver
          image: "{{ .Values.images.repository }}/{{ .Values.images.flintCsiDriver.name }}:{{ .Values.images.flintCsiDriver.tag }}"
          imagePullPolicy: Always
          env:
            - name: CSI_MODE
              value: "node"
            - name: CSI_ENDPOINT
              value: "unix:///csi/csi.sock"
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: SPDK_MODE
              value: "embedded"
            - name: USE_HOSTNAME_TOPOLOGY
              value: "{{ .Values.driver.useHostnameTopology }}"
            - name: FLINT_NAMESPACE
              value: "{{ include "flint-csi-driver-chart.customResourceNamespace" . }}"
            - name: HEALTH_PORT
              value: "{{ .Values.healthCheck.csiDriverPort | default 9809 }}"
          securityContext:
            privileged: true
          ports:
            - name: healthz
              containerPort: {{ .Values.healthCheck.csiDriverPort | default 9809 }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 60
            timeoutSeconds: 3
            periodSeconds: 10
            failureThreshold: 10
          volumeMounts:
            - name: kubelet-dir
              mountPath: /var/lib/kubelet
              mountPropagation: "Bidirectional"
            - name: plugin-dir
              mountPath: /csi
            - name: device-dir
              mountPath: /dev
              mountPropagation: "HostToContainer"
            - name: spdk-socket
              mountPath: /var/tmp
        {{- end }}
        - name: node-driver-registrar
          image: "{{ .Values.csiSidecars.repository }}/{{ .Values.csiSidecars.nodeDriverRegistrar.name }}:{{ .Values.csiSidecars.nodeDriverRegistrar.tag }}"
          imagePullPolicy: Always
          args:
            - "--v=5"
            - "--csi-address=/csi/csi.sock"
            - "--kubelet-registration-path=/var/lib/kubelet/plugins/csi.flint.com/csi.sock"
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi
            - name: registration-dir
              mountPath: /registration
        - name: liveness-probe
          image: "{{ .Values.csiSidecars.repository }}/{{ .Values.csiSidecars.livenessprobe.name }}:{{ .Values.csiSidecars.livenessprobe.tag }}"
          imagePullPolicy: Always
          args:
            - "--csi-address=/csi/csi.sock"
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi
      volumes:
        - name: kubelet-dir
          hostPath:
            path: /var/lib/kubelet
            type: Directory
        - name: plugin-dir
          hostPath:
            path: /var/lib/kubelet/plugins/csi.flint.com
            type: DirectoryOrCreate
        - name: registration-dir
          hostPath:
            path: /var/lib/kubelet/plugins_registry/
            type: Directory
        - name: device-dir
          hostPath:
            path: /dev
            type: Directory
        - name: sys-dir
          hostPath:
            path: /sys
            type: Directory
        - name: hugepages
          emptyDir:
            medium: HugePages
        - name: spdk-socket
          emptyDir: {}
