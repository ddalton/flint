# This YAML file defines the resources that run on each node in the cluster.
# These resources are responsible for managing Flint volumes on the node.

# The DaemonSet for the Flint CSI node driver.
# This DaemonSet ensures that the Flint CSI node driver is running on every node in the cluster.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: flint-csi-node
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: flint-csi-node
  template:
    metadata:
      labels:
        app: flint-csi-node
    spec:
      serviceAccountName: flint-csi-node
      hostNetwork: true
      containers:
        {{- if .Values.deployment.nodeMode | default "two-container" | eq "two-container" }}
        # SPDK Target Container (v25.05.x)
        - name: spdk-target
          image: "{{ .Values.images.repository }}/{{ .Values.images.spdkTarget.name }}:{{ .Values.images.spdkTarget.tag }}"
          imagePullPolicy: Always
          env:
            - name: SPDK_VERSION
              value: "v25.05.x"
          securityContext:
            privileged: true
            capabilities:
              add:
                - SYS_ADMIN
                - SYS_RAWIO
          resources:
            limits:
              hugepages-2Mi: "1Gi"
              memory: "2Gi"
            requests:
              hugepages-2Mi: "1Gi" 
              memory: "1Gi"
          volumeMounts:
            - name: hugepages
              mountPath: /hugepages
            - name: spdk-socket
              mountPath: /var/tmp
            - name: device-dir
              mountPath: /dev
        # CSI Node Agent Container
        - name: node-agent
          image: "{{ .Values.images.repository }}/{{ .Values.images.nodeAgent.name }}:{{ .Values.images.nodeAgent.tag }}"
          imagePullPolicy: Always
          env:
            - name: CSI_ENDPOINT
              value: "unix:///csi/csi.sock"
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: SPDK_RPC_URL
              value: "unix:///var/tmp/spdk.sock"
            - name: LOG_LEVEL
              value: "{{ .Values.logging.level | default "info" }}"
            - name: USE_HOSTNAME_TOPOLOGY
              value: "{{ .Values.driver.useHostnameTopology }}"
          securityContext:
            runAsUser: 65532
            runAsGroup: 0
            allowPrivilegeEscalation: false
        {{- else }}
        # Legacy Embedded Mode Container
        - name: flint-csi-driver
          image: "{{ .Values.images.repository }}/{{ .Values.images.nodeAgentEmbedded.name }}:{{ .Values.images.nodeAgentEmbedded.tag }}"
          imagePullPolicy: Always
          env:
            - name: CSI_MODE
              value: "node"
            - name: CSI_ENDPOINT
              value: "unix:///csi/csi.sock"
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: SPDK_MODE
              value: "embedded"
            - name: USE_HOSTNAME_TOPOLOGY
              value: "{{ .Values.driver.useHostnameTopology }}"
          securityContext:
            privileged: true
        {{- end }}
          ports:
            - name: healthz
              containerPort: 9809
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 10
            timeoutSeconds: 3
            periodSeconds: 10
            failureThreshold: 5
          volumeMounts:
            - name: kubelet-dir
              mountPath: /var/lib/kubelet
              mountPropagation: "Bidirectional"
            - name: plugin-dir
              mountPath: /csi
            - name: device-dir
              mountPath: /dev
            - name: spdk-socket
              mountPath: /var/tmp
        - name: node-driver-registrar
          image: "{{ .Values.csiSidecars.repository }}/{{ .Values.csiSidecars.nodeDriverRegistrar.name }}:{{ .Values.csiSidecars.nodeDriverRegistrar.tag }}"
          imagePullPolicy: Always
          args:
            - "--v=5"
            - "--csi-address=/csi/csi.sock"
            - "--kubelet-registration-path=/var/lib/kubelet/plugins/csi.flint.com/csi.sock"
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi
            - name: registration-dir
              mountPath: /registration
        - name: liveness-probe
          image: "{{ .Values.csiSidecars.repository }}/{{ .Values.csiSidecars.livenessprobe.name }}:{{ .Values.csiSidecars.livenessprobe.tag }}"
          imagePullPolicy: Always
          args:
            - "--csi-address=/csi/csi.sock"
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi
      volumes:
        - name: kubelet-dir
          hostPath:
            path: /var/lib/kubelet
            type: Directory
        - name: plugin-dir
          hostPath:
            path: /var/lib/kubelet/plugins/csi.flint.com
            type: DirectoryOrCreate
        - name: registration-dir
          hostPath:
            path: /var/lib/kubelet/plugins_registry/
            type: Directory
        - name: device-dir
          hostPath:
            path: /dev
            type: Directory
        - name: sys-dir
          hostPath:
            path: /sys
            type: Directory
        - name: hugepages
          emptyDir:
            medium: HugePages
        - name: spdk-socket
          emptyDir: {}
