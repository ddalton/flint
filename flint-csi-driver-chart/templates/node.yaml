# This YAML file defines the resources that run on each node in the cluster.
# These resources are responsible for managing Flint volumes on the node.

# The DaemonSet for the Flint CSI node driver.
# This DaemonSet ensures that the Flint CSI node driver is running on every node in the cluster.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: flint-csi-node
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: flint-csi-node
  template:
    metadata:
      labels:
        app: flint-csi-node
    spec:
      serviceAccountName: flint-csi-node
      hostNetwork: true
      securityContext: {}
      containers:
        {{- if .Values.deployment.nodeMode | default "three-container" | eq "three-container" }}
        # SPDK Target Container (v25.05.x)
        - name: spdk-tgt
          image: "{{ .Values.images.repository }}/{{ .Values.images.spdkTarget.name }}:{{ .Values.images.spdkTarget.tag }}"
          imagePullPolicy: Always
          env:
            - name: SPDK_VERSION
              value: "v25.05.x"
            {{- if ne (.Values.nodeResources.spdkTarget.cpuCore | default 1 | int) -1 }}
            - name: SPDK_CPU_CORE
              value: "{{ .Values.nodeResources.spdkTarget.cpuCore | default 1 }}"
            {{- end }}
          securityContext:
            privileged: true
            capabilities:
              add:
                - SYS_ADMIN
                - SYS_RAWIO
          resources:
            {{- toYaml .Values.nodeResources.spdkTarget | nindent 12 }}
          volumeMounts:
            - name: hugepages
              mountPath: /hugepages
            - name: spdk-socket
              mountPath: /var/tmp
            - name: device-dir
              mountPath: /dev
              mountPropagation: "HostToContainer"
            - name: kubelet-dir
              mountPath: /var/lib/kubelet
              mountPropagation: "Bidirectional"
        # CSI Driver Container (Node Mode)
        - name: flint-csi-driver
          image: "{{ .Values.images.repository }}/{{ .Values.images.flintCsiDriver.name }}:{{ .Values.images.flintCsiDriver.tag }}"
          imagePullPolicy: Always
          env:
            - name: CSI_MODE
              value: "node"
            - name: CSI_ENDPOINT
              value: "unix:///csi/csi.sock"
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: SPDK_RPC_URL
              value: "unix:///var/tmp/spdk.sock"
            - name: USE_HOSTNAME_TOPOLOGY
              value: "{{ .Values.driver.useHostnameTopology }}"
            - name: LOG_LEVEL
              value: "{{ .Values.logging.level | default "info" }}"
            - name: HEALTH_PORT
              value: "{{ .Values.healthCheck.csiDriverPort | default 9809 }}"
          securityContext:
            privileged: true
          ports:
            - name: healthz
              containerPort: {{ .Values.healthCheck.csiDriverPort | default 9809 }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 30
            timeoutSeconds: 3
            periodSeconds: 10
            failureThreshold: 5
          resources:
            {{- toYaml .Values.nodeResources.flintCsiDriver | nindent 12 }}
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi
            - name: device-dir
              mountPath: /dev
              mountPropagation: "HostToContainer"
            - name: spdk-socket
              mountPath: /var/tmp
        # Node Agent Container (Disk Management & API)
        - name: node-agent
          image: "{{ .Values.images.repository }}/{{ .Values.images.nodeAgent.name }}:{{ .Values.images.nodeAgent.tag }}"
          imagePullPolicy: Always
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: SPDK_RPC_URL
              value: "unix:///var/tmp/spdk.sock"
            - name: LOG_LEVEL
              value: "{{ .Values.logging.level | default "info" }}"
            - name: API_PORT
              value: "8081"
            - name: FLINT_NAMESPACE
              value: "{{ include "flint-csi-driver-chart.customResourceNamespace" . }}"
          securityContext:
            privileged: true
          ports:
            - name: api
              containerPort: 8081
              protocol: TCP
          resources:
            {{- toYaml .Values.nodeResources.nodeAgent | nindent 12 }}
          volumeMounts:
            - name: device-dir
              mountPath: /dev
              mountPropagation: "HostToContainer"
            - name: spdk-socket
              mountPath: /var/tmp
        {{- else if .Values.deployment.nodeMode | eq "two-container" }}
        # SPDK Target Container (v25.05.x)
        - name: spdk-tgt
          image: "{{ .Values.images.repository }}/{{ .Values.images.spdkTarget.name }}:{{ .Values.images.spdkTarget.tag }}"
          imagePullPolicy: Always
          env:
            - name: SPDK_VERSION
              value: "v25.05.x"
            {{- if ne (.Values.nodeResources.spdkTarget.cpuCore | default 1 | int) -1 }}
            - name: SPDK_CPU_CORE
              value: "{{ .Values.nodeResources.spdkTarget.cpuCore | default 1 }}"
            {{- end }}
          securityContext:
            privileged: true
            capabilities:
              add:
                - SYS_ADMIN
                - SYS_RAWIO
          resources:
            {{- toYaml .Values.nodeResources.spdkTarget | nindent 12 }}
          volumeMounts:
            - name: hugepages
              mountPath: /hugepages
            - name: spdk-socket
              mountPath: /var/tmp
            - name: device-dir
              mountPath: /dev
              mountPropagation: "HostToContainer"
            - name: kubelet-dir
              mountPath: /var/lib/kubelet
              mountPropagation: "Bidirectional"
        # CSI Node Agent Container (Legacy - both CSI + Disk Management)
        - name: node-agent
          image: "{{ .Values.images.repository }}/{{ .Values.images.nodeAgent.name }}:{{ .Values.images.nodeAgent.tag }}"
          imagePullPolicy: Always
          env:
            - name: CSI_ENDPOINT
              value: "unix:///csi/csi.sock"
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: SPDK_RPC_URL
              value: "unix:///var/tmp/spdk.sock"
            - name: LOG_LEVEL
              value: "{{ .Values.logging.level | default "info" }}"
            - name: USE_HOSTNAME_TOPOLOGY
              value: "{{ .Values.driver.useHostnameTopology }}"
            - name: FLINT_NAMESPACE
              value: "{{ include "flint-csi-driver-chart.customResourceNamespace" . }}"
          securityContext:
            runAsUser: 65532
            runAsGroup: 0
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi
            - name: device-dir
              mountPath: /dev
              mountPropagation: "HostToContainer"
            - name: spdk-socket
              mountPath: /var/tmp
        {{- else }}
        # Legacy Embedded Mode Container (Single container with both SPDK + CSI)
        - name: flint-csi-driver
          image: "{{ .Values.images.repository }}/{{ .Values.images.flintCsiDriver.name }}:{{ .Values.images.flintCsiDriver.tag }}"
          imagePullPolicy: Always
          env:
            - name: CSI_MODE
              value: "node"
            - name: CSI_ENDPOINT
              value: "unix:///csi/csi.sock"
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: SPDK_MODE
              value: "embedded"
            - name: USE_HOSTNAME_TOPOLOGY
              value: "{{ .Values.driver.useHostnameTopology }}"
            - name: FLINT_NAMESPACE
              value: "{{ include "flint-csi-driver-chart.customResourceNamespace" . }}"
            - name: HEALTH_PORT
              value: "{{ .Values.healthCheck.csiDriverPort | default 9809 }}"
          securityContext:
            privileged: true
          ports:
            - name: healthz
              containerPort: {{ .Values.healthCheck.csiDriverPort | default 9809 }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 60
            timeoutSeconds: 3
            periodSeconds: 10
            failureThreshold: 10
          volumeMounts:
            - name: kubelet-dir
              mountPath: /var/lib/kubelet
              mountPropagation: "Bidirectional"
            - name: plugin-dir
              mountPath: /csi
            - name: device-dir
              mountPath: /dev
              mountPropagation: "HostToContainer"
            - name: spdk-socket
              mountPath: /var/tmp
        {{- end }}
        - name: node-driver-registrar
          image: "{{ .Values.csiSidecars.repository }}/{{ .Values.csiSidecars.nodeDriverRegistrar.name }}:{{ .Values.csiSidecars.nodeDriverRegistrar.tag }}"
          imagePullPolicy: Always
          args:
            - "--v=5"
            - "--csi-address=/csi/csi.sock"
            - "--kubelet-registration-path=/var/lib/kubelet/plugins/csi.flint.com/csi.sock"
          resources:
            {{- toYaml .Values.nodeResources.nodeDriverRegistrar | nindent 12 }}
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi
            - name: registration-dir
              mountPath: /registration
        - name: liveness-probe
          image: "{{ .Values.csiSidecars.repository }}/{{ .Values.csiSidecars.livenessprobe.name }}:{{ .Values.csiSidecars.livenessprobe.tag }}"
          imagePullPolicy: Always
          args:
            - "--csi-address=/csi/csi.sock"
          resources:
            {{- toYaml .Values.nodeResources.livenessprobe | nindent 12 }}
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi
      volumes:
        - name: kubelet-dir
          hostPath:
            path: /var/lib/kubelet
            type: Directory
        - name: plugin-dir
          hostPath:
            path: /var/lib/kubelet/plugins/csi.flint.com
            type: DirectoryOrCreate
        - name: registration-dir
          hostPath:
            path: /var/lib/kubelet/plugins_registry/
            type: Directory
        - name: device-dir
          hostPath:
            path: /dev
            type: Directory
        - name: sys-dir
          hostPath:
            path: /sys
            type: Directory
        - name: hugepages
          emptyDir:
            medium: HugePages
        - name: spdk-socket
          emptyDir: {}
