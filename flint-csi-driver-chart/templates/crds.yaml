{{- if .Values.crds.install }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: volumesnapshotclasses.snapshot.storage.k8s.io
  annotations:
    "helm.sh/resource-policy": keep
spec:
  group: snapshot.storage.k8s.io
  names:
    kind: VolumeSnapshotClass
    listKind: VolumeSnapshotClassList
    plural: volumesnapshotclasses
    singular: volumesnapshotclass
  scope: Cluster
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        description: VolumeSnapshotClass specifies parameters that a CSI driver may need when creating a volume snapshot.
        properties:
          apiVersion:
            type: string
          deletionPolicy:
            description: DeletionPolicy determines whether a VolumeSnapshotContent created through the VolumeSnapshotClass should be deleted when its bound VolumeSnapshot is deleted.
            enum:
            - Delete
            - Retain
            type: string
          driver:
            description: The name of the CSI driver that this VolumeSnapshotClass is for.
            type: string
          kind:
            type: string
          metadata:
            type: object
          parameters:
            additionalProperties:
              type: string
            type: object
        required:
        - deletionPolicy
        - driver
        type: object
    served: true
    storage: true
    subresources: {}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: volumesnapshotcontents.snapshot.storage.k8s.io
  annotations:
    "helm.sh/resource-policy": keep
spec:
  group: snapshot.storage.k8s.io
  names:
    kind: VolumeSnapshotContent
    listKind: VolumeSnapshotContentList
    plural: volumesnapshotcontents
    singular: volumesnapshotcontent
  scope: Cluster
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        description: VolumeSnapshotContent represents the actual snapshot on the storage system.
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            properties:
              deletionPolicy:
                description: DeletionPolicy determines whether this VolumeSnapshotContent should be deleted when its bound VolumeSnapshot is deleted.
                enum:
                - Delete
                - Retain
                type: string
              driver:
                description: The name of the CSI driver used to create this snapshot.
                type: string
              source:
                properties:
                  volumeHandle:
                    description: volumeHandle is the unique identifier of the source volume defined by the CSI driver.
                    type: string
                type: object
              volumeSnapshotClassName:
                description: The name of the VolumeSnapshotClass from which this snapshot was created.
                type: string
              volumeSnapshotRef:
                description: A reference to the VolumeSnapshot object to which this content belongs.
                properties:
                  name:
                    type: string
                  namespace:
                    type: string
                  uid:
                    type: string
                type: object
            required:
            - deletionPolicy
            - driver
            - source
            - volumeSnapshotRef
            type: object
          status:
            properties:
              creationTime:
                format: int64
                type: integer
              error:
                properties:
                  message:
                    type: string
                  time:
                    format: date-time
                    type: string
                type: object
              readyToUse:
                type: boolean
              restoreSize:
                format: int64
                type: integer
              snapshotHandle:
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: volumesnapshots.snapshot.storage.k8s.io
  annotations:
    "helm.sh/resource-policy": keep
spec:
  group: snapshot.storage.k8s.io
  names:
    kind: VolumeSnapshot
    listKind: VolumeSnapshotList
    plural: volumesnapshots
    singular: volumesnapshot
  scope: Namespaced
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        description: VolumeSnapshot is a user's request for a snapshot of a persistent volume.
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            properties:
              source:
                properties:
                  persistentVolumeClaimName:
                    description: The name of the PersistentVolumeClaim to snapshot.
                    type: string
                type: object
              volumeSnapshotClassName:
                description: The name of the VolumeSnapshotClass requested by the VolumeSnapshot.
                type: string
            required:
            - source
            type: object
          status:
            properties:
              boundVolumeSnapshotContentName:
                type: string
              creationTime:
                format: date-time
                type: string
              error:
                properties:
                  message:
                    type: string
                  time:
                    format: date-time
                    type: string
                type: object
              readyToUse:
                type: boolean
              restoreSize:
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}
