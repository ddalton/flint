{{- if .Values.dashboard.enabled }}
{{- $auth := .Values.dashboard.auth | default dict }}
{{- $adminPassword := $auth.adminPassword | default "" }}
{{- if not $adminPassword }}
{{- /* Generate once and preserve across upgrades: reuse the live Secret's
       value if present (lookup returns an empty map under `helm template`,
       in which case the backend generates and logs a one-time password). */}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace "spdk-dashboard-auth" }}
{{- if and $existing $existing.data (hasKey $existing.data "admin-password") }}
{{- $adminPassword = index $existing.data "admin-password" | b64dec }}
{{- else }}
{{- $adminPassword = randAlphaNum 24 }}
{{- end }}
{{- end }}
# Credentials for the dashboard API (enforced by the backend).
# Read the admin password with:
#   kubectl -n {{ .Release.Namespace }} get secret spdk-dashboard-auth -o jsonpath='{.data.admin-password}' | base64 -d
apiVersion: v1
kind: Secret
metadata:
  name: spdk-dashboard-auth
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "flint-csi-driver-chart.labels" . | nindent 4 }}
    component: dashboard
type: Opaque
stringData:
  admin-password: {{ $adminPassword | quote }}
  {{- if $auth.viewerPassword }}
  viewer-password: {{ $auth.viewerPassword | quote }}
  {{- end }}
---
# Dashboard Deployment for SPDK CSI Driver
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spdk-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "flint-csi-driver-chart.labels" . | nindent 4 }}
    component: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spdk-dashboard
      component: dashboard
  template:
    metadata:
      labels:
        app: spdk-dashboard
        component: dashboard
    spec:
      serviceAccountName: flint-csi-controller
      containers:
        - name: dashboard-backend
          image: "{{ .Values.images.repository }}/{{ .Values.images.flintCsiDriver.name }}:{{ .Values.images.flintCsiDriver.tag }}"
          imagePullPolicy: Always
          env:
            - name: CSI_MODE
              value: "controller"
            - name: ENABLE_DASHBOARD
              value: "true"
            - name: DASHBOARD_PORT
              value: {{ .Values.dashboard.backend.port | default 8080 | quote }}
            - name: CSI_ENDPOINT
              value: "tcp://0.0.0.0:50051"
            - name: RUST_LOG
              value: {{ .Values.logLevel | default "info" | quote }}
            - name: FLINT_NAMESPACE
              value: "{{ include "flint-csi-driver-chart.customResourceNamespace" . }}"
            - name: NODE_AGENT_PORT
              value: {{ .Values.healthCheck.nodeAgentPort | default 9081 | quote }}
            - name: DASHBOARD_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: spdk-dashboard-auth
                  key: admin-password
            {{- if $auth.viewerPassword }}
            - name: DASHBOARD_VIEWER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: spdk-dashboard-auth
                  key: viewer-password
            {{- end }}
            - name: DASHBOARD_SESSION_TTL_SECS
              value: {{ $auth.sessionTtlSecs | default 43200 | quote }}
          ports:
            - name: api
              containerPort: 8080
              protocol: TCP
          # Probe /healthz (server-loop-only), NOT /api/dashboard: the
          # aggregate endpoint fans out to every node agent, so probing it
          # couples pod health to node reachability — one dead node used to
          # liveness-kill a healthy backend.
          livenessProbe:
            httpGet:
              path: /healthz
              port: api
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: api
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.dashboard.resources.backend | nindent 12 }}
        - name: dashboard-frontend
          image: "{{ .Values.images.repository }}/{{ .Values.dashboard.frontend.name }}:{{ .Values.dashboard.frontend.tag }}"
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: REACT_APP_API_BASE_URL
              value: "http://localhost:8080"
            - name: NODE_ENV
              value: "production"
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.dashboard.resources.frontend | nindent 12 }}
      volumes:
        - name: nginx-config
          configMap:
            name: spdk-dashboard-nginx-config
      {{- with .Values.dashboard.nodeSelector | default .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dashboard.tolerations | default .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dashboard.affinity | default .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName }}
      {{- end }}
---
# Dashboard Service
apiVersion: v1
kind: Service
metadata:
  name: spdk-dashboard-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "flint-csi-driver-chart.labels" . | nindent 4 }}
    component: dashboard
spec:
  # ClusterIP + nginx-only on purpose: the backend API port is NOT exposed on
  # the Service — everything goes through the frontend's /api/ proxy, and the
  # backend enforces bearer-token auth regardless.
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app: spdk-dashboard
    component: dashboard
---
# Optional: Ingress for external access
{{- if .Values.dashboard.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spdk-dashboard-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "flint-csi-driver-chart.labels" . | nindent 4 }}
    component: dashboard
  {{- with .Values.dashboard.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.dashboard.ingress.tls }}
  tls:
    {{- range .Values.dashboard.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.dashboard.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: spdk-dashboard-service
                port:
                  number: 80
          {{- end }}
    {{- end }}
{{- end }}
---
# ConfigMap for nginx configuration (frontend proxy)
apiVersion: v1
kind: ConfigMap
metadata:
  name: spdk-dashboard-nginx-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "flint-csi-driver-chart.labels" . | nindent 4 }}
    component: dashboard
data:
  default.conf: |
    server {
        listen 3000;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Serve static files
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "public, max-age=3600";
        }

        # Proxy API requests to backend
        location /api/ {
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
{{- end }} 