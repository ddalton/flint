apiVersion: storage.k8s.io/v1
kind: CSIDriver
metadata:
  name: {{ .Values.driver.name }}
  labels:
    {{- include "flint-csi-driver-chart.labels" . | nindent 4 }}
spec:
  # attachRequired: false means volumes are local to the node and don't need 
  # ControllerPublishVolume/ControllerUnpublishVolume calls
  # This is correct for SPDK local volumes and required for ephemeral volumes
  attachRequired: false
  podInfoOnMount: true
  volumeLifecycleModes:
    - Persistent
    {{- if .Values.driver.enableEphemeral }}
    - Ephemeral
    {{- end }}
  fsGroupPolicy: ReadWriteOnceWithFSType
