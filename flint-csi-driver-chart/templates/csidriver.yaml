apiVersion: storage.k8s.io/v1
kind: CSIDriver
metadata:
  name: {{ .Values.driver.name }}
  labels:
    {{- include "flint-csi-driver-chart.labels" . | nindent 4 }}
spec:
  attachRequired: true
  podInfoOnMount: true
  volumeLifecycleModes:
    - Persistent
    {{- if .Values.driver.enableEphemeral }}
    - Ephemeral
    {{- end }}
  fsGroupPolicy: ReadWriteOnceWithFSType
