# This YAML file defines the Flint CSI controller and related resources.
# The controller is responsible for managing the lifecycle of Flint volumes.

# The Deployment for the Flint CSI controller with all required sidecars.
# This Deployment ensures that a single instance of the Flint CSI controller is running in the cluster.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flint-csi-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "flint-csi-driver-chart.labels" . | nindent 4 }}
    component: csi-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flint-csi-controller
  template:
    metadata:
      labels:
        app: flint-csi-controller
        component: csi-controller
    spec:
      serviceAccountName: flint-csi-controller
      containers:
        - name: flint-csi-controller
          image: "{{ .Values.images.repository }}/{{ .Values.images.flintCsiDriver.name }}:{{ .Values.images.flintCsiDriver.tag }}"
          imagePullPolicy: Always
          env:
            - name: CSI_MODE
              value: "controller"
            - name: CSI_ENDPOINT
              value: "unix:///csi/csi.sock"
            - name: USE_HOSTNAME_TOPOLOGY
              value: "{{ .Values.driver.useHostnameTopology }}"
            - name: FLINT_NAMESPACE
              value: "{{ include "flint-csi-driver-chart.customResourceNamespace" . }}"
            - name: HEALTH_PORT
              value: "{{ .Values.healthCheck.controllerPort | default 9809 }}"
            - name: NODE_AGENT_PORT
              value: "{{ .Values.healthCheck.nodeAgentPort | default 9081 }}"
            {{- if .Values.dashboard.enabled }}
            - name: ENABLE_DASHBOARD
              value: "true"
            - name: DASHBOARD_PORT
              value: {{ .Values.dashboard.backend.port | default 8080 | quote }}
            {{- else }}
            - name: ENABLE_DASHBOARD
              value: "false"
            {{- end }}
            {{- if .Values.nfs.enabled }}
            # NFS server configuration for ReadWriteMany (RWX) volumes
            - name: NFS_ENABLED
              value: "true"
            # NFS server uses CSI driver image (includes flint-nfs-server binary)
            # Can be overridden with nfs.image.* if a separate image is needed
            - name: IMAGE_REPOSITORY
              value: {{ .Values.images.repository | quote }}
            - name: CSI_DRIVER_IMAGE_NAME
              value: {{ .Values.images.flintCsiDriver.name | quote }}
            - name: CSI_DRIVER_IMAGE_TAG
              value: {{ .Values.images.flintCsiDriver.tag | quote }}
            {{- if .Values.images.flintNfsServer }}
            - name: NFS_IMAGE_REPOSITORY
              value: {{ .Values.images.repository | quote }}
            - name: NFS_IMAGE_NAME
              value: {{ .Values.images.flintNfsServer.name | quote }}
            - name: NFS_IMAGE_TAG
              value: {{ .Values.images.flintNfsServer.tag | quote }}
            - name: NFS_IMAGE_PULL_POLICY
              value: {{ .Values.images.flintNfsServer.pullPolicy | quote }}
            {{- end }}
            - name: NFS_SERVER_PORT
              value: {{ .Values.nfs.port | default 2049 | quote }}
            - name: NFS_NAMESPACE
              value: {{ .Values.nfs.namespace | default .Release.Namespace | quote }}
            {{- if .Values.nfs.resources }}
            - name: NFS_MEMORY_REQUEST
              value: {{ .Values.nfs.resources.requests.memory | default "128Mi" | quote }}
            - name: NFS_CPU_REQUEST
              value: {{ .Values.nfs.resources.requests.cpu | default "100m" | quote }}
            - name: NFS_MEMORY_LIMIT
              value: {{ .Values.nfs.resources.limits.memory | default "256Mi" | quote }}
            - name: NFS_CPU_LIMIT
              value: {{ .Values.nfs.resources.limits.cpu | default "500m" | quote }}
            {{- end }}
            {{- else }}
            # NFS support disabled - existing RWO-only behavior maintained
            - name: NFS_ENABLED
              value: "false"
            {{- end }}
          args:
            - "--v={{ .Values.logLevel }}"
          ports:
            - name: healthz
              containerPort: {{ .Values.healthCheck.controllerPort | default 9809 }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 10
            timeoutSeconds: 3
            periodSeconds: 10
            failureThreshold: 5
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
        - name: csi-provisioner
          image: "{{ .Values.csiSidecars.repository }}/{{ .Values.csiSidecars.externalProvisioner.name }}:{{ .Values.csiSidecars.externalProvisioner.tag }}"
          imagePullPolicy: Always
          args:
            - "--csi-address=/csi/csi.sock"
            - "--feature-gates=Topology=true"
            - "--strict-topology"
            - "--immediate-topology=false"
            - "--v=5"
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
        - name: csi-attacher
          image: "{{ .Values.csiSidecars.repository }}/{{ .Values.csiSidecars.externalAttacher.name }}:{{ .Values.csiSidecars.externalAttacher.tag }}"
          imagePullPolicy: Always
          args:
            - "--csi-address=/csi/csi.sock"
            - "--v=5"
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
        - name: csi-resizer
          image: "{{ .Values.csiSidecars.repository }}/{{ .Values.csiSidecars.externalResizer.name }}:{{ .Values.csiSidecars.externalResizer.tag }}"
          imagePullPolicy: Always
          args:
            - "--csi-address=/csi/csi.sock"
            - "--v=5"
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
        - name: csi-snapshotter
          image: "{{ .Values.csiSidecars.repository }}/{{ .Values.csiSidecars.externalSnapshotter.name }}:{{ .Values.csiSidecars.externalSnapshotter.tag }}"
          imagePullPolicy: Always
          args:
            - "--csi-address=/csi/csi.sock"
            - "--v=5"
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
        - name: liveness-probe
          image: "{{ .Values.csiSidecars.repository }}/{{ .Values.csiSidecars.livenessprobe.name }}:{{ .Values.csiSidecars.livenessprobe.tag }}"
          imagePullPolicy: Always
          args:
            - "--csi-address=/csi/csi.sock"
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
        {{- if .Values.driver.enableSanityTestProxy }}
        # Proxy sidecar for CSI Sanity testing - exposes Unix socket via TCP
        - name: grpc-proxy
          image: alpine/socat:latest
          command:
            - socat
            - TCP-LISTEN:{{ .Values.driver.sanityProxyPort }},reuseaddr,fork
            - UNIX-CONNECT:/csi/csi.sock
          ports:
          - containerPort: {{ .Values.driver.sanityProxyPort }}
            name: grpc-proxy
            protocol: TCP
          volumeMounts:
          - name: socket-dir
            mountPath: /csi
        {{- end }}
      volumes:
        - name: socket-dir
          emptyDir: {}
