{{- if .Values.crds.installSnapshotCRDs }}
# Standard Kubernetes snapshot CRDs
# These are often already installed by cluster operators (RKE2, EKS, etc.)
# Set crds.installSnapshotCRDs=false if they already exist in your cluster

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: volumesnapshotclasses.snapshot.storage.k8s.io
  annotations:
    "helm.sh/resource-policy": keep
spec:
  group: snapshot.storage.k8s.io
  names:
    kind: VolumeSnapshotClass
    listKind: VolumeSnapshotClassList
    plural: volumesnapshotclasses
    singular: volumesnapshotclass
  scope: Cluster
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        description: VolumeSnapshotClass specifies parameters that a CSI driver may need when creating a volume snapshot.
        properties:
          apiVersion:
            type: string
          deletionPolicy:
            description: DeletionPolicy determines whether a VolumeSnapshotContent created through the VolumeSnapshotClass should be deleted when its bound VolumeSnapshot is deleted.
            enum:
            - Delete
            - Retain
            type: string
          driver:
            description: The name of the CSI driver that this VolumeSnapshotClass is for.
            type: string
          kind:
            type: string
          metadata:
            type: object
          parameters:
            additionalProperties:
              type: string
            type: object
        required:
        - deletionPolicy
        - driver
        type: object
    served: true
    storage: true
    subresources: {}
---
# Note: Only include the standard snapshot CRDs here.
# SPDK-specific CRDs are in spdk-crds.yaml and should almost always be installed.
{{- end }} 