// pNFS MDS-DS Control Protocol
// 
// This protocol is used for Data Server registration, heartbeats,
// and capacity reporting to the Metadata Server.
//
// Communication is DS -> MDS (DS initiates, MDS responds)

syntax = "proto3";

package pnfs.control;

// MDS Control Service - manages data server registration and monitoring
service MdsControl {
  // Register a new data server with the MDS
  rpc RegisterDataServer(RegisterRequest) returns (RegisterResponse);
  
  // Send heartbeat to MDS
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  
  // Update capacity information
  rpc UpdateCapacity(CapacityUpdate) returns (CapacityResponse);
  
  // Unregister data server (clean shutdown)
  rpc UnregisterDataServer(UnregisterRequest) returns (UnregisterResponse);

  // Provision a new pNFS volume — creates the metadata file under the
  // MDS export, sized to `size_bytes`. Idempotent: a CreateVolume call
  // with a matching size on an existing volume is a success; mismatch
  // is an error. Called by the CSI provisioner on behalf of
  // CreateVolume gRPC requests.
  rpc CreateVolume(CreateVolumeRequest) returns (CreateVolumeResponse);

  // Delete a pNFS volume — removes its directory subtree (or the
  // legacy metadata file) and reclaims all DS stripes pinned under
  // it. Idempotent: DeleteVolume on an absent volume is a success.
  rpc DeleteVolume(DeleteVolumeRequest) returns (DeleteVolumeResponse);
}

// CreateVolume request from CSI driver to MDS.
message CreateVolumeRequest {
  // CSI-provisioner-assigned volume ID. Becomes the file name under
  // the MDS export. Must be safe as a filesystem path component
  // (no slashes, no NUL).
  string volume_id = 1;

  // Total volume size in bytes. The MDS pre-allocates (sparse) to
  // this size so kernel WRITEs at any offset within the volume succeed.
  uint64 size_bytes = 2;
}

message CreateVolumeResponse {
  // Whether the volume was created (or already existed with matching size).
  bool created = 1;

  // Absolute path of the MDS export root
  // (e.g. "/tmp/flint-pnfs-mds-exports"). Directory volumes are
  // subtrees under it; the client mounts `<mds>:/<volume_file>`.
  string export_path = 2;

  // Volume name relative to `export_path` (directory subtree, or the
  // sparse file for legacy volumes). Currently equal to `volume_id`,
  // but kept separate to allow future per-tenant prefixes.
  string volume_file = 3;

  // Error message on failure (created=false). Empty on success.
  string message = 4;

  // Port the MDS serves NFSv4.1 on (its `bind.port`). The CSI driver
  // dialed the *gRPC* port to make this call — that is not the NFS
  // port, and mounting against it fails. 0 (an older MDS that predates
  // this field) → the caller falls back to the standard 2049.
  uint32 nfs_port = 5;

  // True when the volume is a directory subtree (directory-per-volume
  // model): NodePublish must mount `<mds>:/<volume_file>` so each PVC
  // gets an isolated namespace. False = legacy sparse-file volume (or
  // an older MDS that predates the field): NodePublish mounts the
  // export root as before.
  bool directory = 6;
}

message DeleteVolumeRequest {
  string volume_id = 1;
}

message DeleteVolumeResponse {
  bool deleted = 1;
  string message = 2;
}

// DS Control Service — the reverse direction: MDS → DS.
//
// Served by each DS on its control port (bind.controlPort), protected
// by the same FLINT_PNFS_CONTROL_TOKEN bearer scheme as MdsControl.
// Exists for operations whose correctness cannot wait for the
// heartbeat cycle: a client that truncates a striped file re-acquires
// layouts immediately after the SETATTR reply, so stale stripe bytes
// must be gone BEFORE the MDS answers — not one heartbeat later.
service DsControl {
  // Set a stripe file's length (both directions; a no-op if the file
  // does not exist — nothing written means nothing stale). Called by
  // the MDS while applying a client's size-changing SETATTR/OPEN, so
  // that bytes beyond the new EOF can never be re-exposed by a later
  // extension (fsx-found: truncate-down left stale stripe bytes).
  rpc TruncateStripeFile(TruncateStripeFileRequest) returns (TruncateStripeFileResponse);
}

message TruncateStripeFileRequest {
  // The device the MDS believes it is talking to. The DS refuses a
  // mismatch (identity guard — same rationale as the registration
  // stamp: mutating another device's volume corrupts silently).
  string device_id = 1;

  // Stripe file path RELATIVE to the DS data dir.
  string rel_path = 2;

  // New file length in bytes (the file's new logical size — stripe
  // files are sparse/logically-addressed, so the length is uniform
  // across the group).
  uint64 new_length = 3;
}

message TruncateStripeFileResponse {
  bool ok = 1;
  // Error detail when ok=false. Empty on success.
  string message = 2;
}

// Registration request from DS to MDS
message RegisterRequest {
  // Unique device identifier (e.g., "ds-node1-lvol0")
  string device_id = 1;
  
  // Primary endpoint (IP:port where DS is listening for NFS)
  string endpoint = 2;
  
  // Additional endpoints for multipath/RDMA
  repeated string multipath_endpoints = 3;
  
  // Mount points this DS serves
  repeated string mount_points = 4;
  
  // Total capacity in bytes
  uint64 capacity = 5;
  
  // Used capacity in bytes
  uint64 used = 6;
  
  // Protocol version
  uint32 protocol_version = 7;

  // Unix-seconds creation stamp of the DS's on-volume identity marker
  // (.flint-ds-identity, durable-DS plan Phase 2). Stamped once at the
  // volume's first boot and stable for the volume's lifetime, so a
  // CHANGE across re-registrations of the same device_id means the DS
  // is serving a different data volume than before — the MDS logs
  // that transition at WARN. 0 from a DS that predates the field.
  uint64 identity_created_at = 8;

  // Port this DS serves DsControl (MDS → DS gRPC) on. The MDS reaches
  // it at the same host it uses for NFS I/O (the operator-configured
  // endpoint when one exists). 0 = DS has no control listener (older
  // build or unconfigured) — truncate propagation then parks the file
  // dirty until the listener appears; see the operator runbook.
  uint32 control_port = 9;
}

// Registration response from MDS to DS
message RegisterResponse {
  // Whether registration was accepted
  bool accepted = 1;
  
  // Message (error reason if not accepted, or success confirmation)
  string message = 2;
  
  // Assigned device ID (may be different if MDS modified it)
  string assigned_device_id = 3;
}

// Heartbeat request from DS to MDS
message HeartbeatRequest {
  // Device ID
  string device_id = 1;
  
  // Current capacity in bytes
  uint64 capacity = 2;
  
  // Current used space in bytes
  uint64 used = 3;
  
  // Number of active connections
  uint32 active_connections = 4;
  
  // Health status
  HealthStatus health = 5;
}

// Heartbeat response from MDS to DS
message HeartbeatResponse {
  // Whether heartbeat was acknowledged
  bool acknowledged = 1;
  
  // MDS instructions (optional)
  repeated Instruction instructions = 2;
}

// Capacity update (can be sent independently of heartbeat)
message CapacityUpdate {
  string device_id = 1;
  uint64 capacity = 2;
  uint64 used = 3;
}

message CapacityResponse {
  bool acknowledged = 1;
}

// Unregister request (clean shutdown)
message UnregisterRequest {
  string device_id = 1;
  string reason = 2;
}

message UnregisterResponse {
  bool acknowledged = 1;
}

// Health status of DS
enum HealthStatus {
  HEALTHY = 0;
  DEGRADED = 1;
  UNHEALTHY = 2;
}

// Instructions from MDS to DS
message Instruction {
  InstructionType type = 1;
  string details = 2;
}

enum InstructionType {
  NO_OP = 0;
  INCREASE_HEARTBEAT_FREQUENCY = 1;
  PREPARE_FOR_SHUTDOWN = 2;
  REPORT_CAPACITY_IMMEDIATELY = 3;
  // Best-effort stripe-file cleanup after NFS REMOVE (or a rename that
  // overwrote a striped target). `details` = the stripe file's path
  // RELATIVE to the DS data dir. Correctness never depends on this —
  // a recreated file gets a fresh file_id and therefore fresh stripe
  // paths — it only reclaims space.
  DELETE_STRIPE_FILE = 4;
}

