[package]
name = "spdk-csi-driver"
version = "0.4.0"
edition = "2021"

[[bin]]
name = "controller"
path = "src/controller_operator.rs"

[[bin]]
name = "node-agent"
path = "src/node_agent.rs"

[[bin]]
name = "csi-driver"
path = "src/main.rs"

[[bin]]
name = "spdk-dashboard-backend"
path = "src/spdk_dashboard_backend.rs"

[dependencies]
tokio = { version = "1.0", features = ["full"] }
kube = { version = "0.87", features = ["client", "derive", "runtime"] }
k8s-openapi = { version = "0.20", features = ["latest"] }
schemars = { version = "0.8", features = ["chrono"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
reqwest = { version = "0.11", features = ["json"] }
axum = "0.7"
tower = "0.4"
tower-http = { version = "0.5", features = ["cors"] }
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
anyhow = "1.0"
tracing = "0.1"
tracing-subscriber = "0.3"
clap = { version = "4.0", features = ["derive"] }
warp = "0.3"
tonic = "0.10"
prost = "0.12"
prost-types = "0.12"
regex = "1.0"
futures = "0.3"
tokio-stream = { version = "0.1", features = ["net"] }

# SPDK Integration - Custom bindings generated for Flint's specific needs
# No external dependencies - bindings generated from your SPDK v25.05 installation

[build-dependencies]
tonic-build = "0.10"
bindgen = "0.70"
prost-build = "0.12"

[lib]
name = "spdk_csi_driver"
path = "src/lib.rs"
